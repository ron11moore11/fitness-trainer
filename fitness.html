<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מאמן כושר</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #1a1a2e;
      --card:    #16213e;
      --border:  #0f3460;
      --accent:  #e94560;
      --accent2: #a8dadc;
      --text:    #e0e0e0;
      --muted:   #888;
      --shift:   #ffa726;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOADING */
    #loading-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .loading-box { text-align: center; color: var(--accent2); }
    .spinner {
      width: 44px; height: 44px; border: 4px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-box p { font-size: 1rem; }
    .loading-box small { color: var(--muted); font-size: .82rem; margin-top: 6px; display: block; }

    /* NAV */
    nav {
      background: var(--card); border-bottom: 2px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 60px; position: sticky; top: 0; z-index: 100; gap: 12px;
    }
    .app-title { color: var(--accent); font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 15px rgba(233,69,96,.5); white-space: nowrap; }
    .nav-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .nav-tab {
      background: none; border: 2px solid transparent; color: var(--muted);
      padding: 7px 13px; border-radius: 8px; cursor: pointer; font-size: .85rem; transition: all .2s;
    }
    .nav-tab:hover { color: var(--text); border-color: var(--border); }
    .nav-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(233,69,96,.1); }

    /* MAIN */
    main { padding: 24px; max-width: 1100px; margin: 0 auto; }
    section[id^="tab-"] { display: none; }
    section[id^="tab-"].active { display: block; }

    /* CARDS */
    .card { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 18px; }
    .card-title { color: var(--accent2); font-size: 1rem; margin-bottom: 6px; }
    .card-value { font-size: 2rem; font-weight: bold; }
    .dashboard { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 28px; }

    /* SECTION HEADER */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .section-header h2 { font-size: 1.2rem; color: var(--accent2); }
    .sub-header { font-size: 1rem; color: var(--muted); margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

    /* BUTTONS */
    .btn {
      background: var(--accent); color: #fff; border: none; padding: 8px 20px;
      border-radius: 8px; cursor: pointer; font-size: .9rem;
      transition: background .2s, transform .1s; text-decoration: none; display: inline-block;
    }
    .btn:hover { background: #c73652; transform: scale(1.03); }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-sm { padding: 4px 12px; font-size: .8rem; }
    .btn-ghost { background: none; border: 2px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: none; transform: scale(1.03); }
    .btn-danger { background: #7b1d2e; }
    .btn-danger:hover { background: #a32540; }
    .btn-teal { background: #1a5a6a; }
    .btn-teal:hover { background: #126070; }
    .wa-btn { background: #1a7a3c; }
    .wa-btn:hover { background: #145f2e; }
    .btn-log { background: #5c4b9e; }
    .btn-log:hover { background: #7b6bb5; }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 14px; text-align: right; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-size: .85rem; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.03); }
    .actions { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }

    /* BADGES */
    .badge { padding: 3px 10px; border-radius: 10px; font-size: .75rem; font-weight: 600; display: inline-block; }
    .badge-paid    { background: #1a4a2e; color: #4caf50; }
    .badge-pending { background: #4a3a1a; color: #ffa726; }
    .badge-cat  { background: rgba(168,218,220,.15); color: var(--accent2); }
    .badge-tmpl { background: rgba(233,69,96,.15); color: var(--accent); }
    .badge-shift { background: rgba(255,167,38,.15); color: var(--shift); }
    .badge-recurring { background: rgba(168,218,220,.15); color: var(--accent2); font-size: .75rem; }
    .badge-logged { background: rgba(92,75,158,.2); color: #b39ddb; }
    .badge-active  { background: #1a4a2e; color: #4caf50; }
    .badge-paused  { background: #4a3a1a; color: #ffa726; }
    .badge-stopped { background: #4a1a1a; color: #e94560; }

    /* STATUS FILTER */
    .status-filter { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 12px; font-size: .85rem; }
    .status-filter:focus { outline: none; border-color: var(--accent2); }

    /* PAYMENT FILTERS */
    .pay-filters { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .pay-filters-title { color: var(--accent2); font-size: .9rem; margin-bottom: 12px; font-weight: 600; }
    .month-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .month-btn { background: var(--bg); border: 2px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: .8rem; transition: all .2s; }
    .month-btn:hover { border-color: var(--accent2); color: var(--text); }
    .month-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,.1); }
    .pay-filter-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .pay-filter-row .form-group { margin-bottom: 0; min-width: 140px; }

    /* EMPTY */
    .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 1rem; }

    /* CALENDAR */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-nav h3 { color: var(--accent2); font-size: 1.1rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 24px; }
    .cal-day-name { text-align: center; font-size: .75rem; color: var(--muted); padding: 4px 0; }
    .cal-day { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 4px; min-height: 52px; text-align: center; cursor: pointer; transition: border-color .2s; }
    .cal-day:hover { border-color: var(--accent); }
    .cal-day.today { border-color: var(--accent2); }
    .cal-day.empty-day { background: none; border-color: transparent; cursor: default; }
    .cal-day-num { font-size: .85rem; color: var(--muted); }
    .cal-day.today .cal-day-num { color: var(--accent2); font-weight: bold; }
    .cal-day.selected { border-color: var(--accent); background: rgba(233,69,96,.1); }
    .cal-day.selected .cal-day-num { color: var(--accent); font-weight: bold; }
    .cal-day.week-selected { background: rgba(233,69,96,.06); border-color: rgba(233,69,96,.3); }
    .cal-dots { display: flex; gap: 3px; justify-content: center; margin-top: 4px; flex-wrap: wrap; }
    .cal-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .cal-dot.shift-dot { background: var(--shift); }

    /* PLAN CARDS */
    .plans-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 16px; }
    .plan-card { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 16px; }
    .plan-card.tmpl-card { border-color: rgba(233,69,96,.4); }
    .plan-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .plan-name { font-size: 1rem; font-weight: bold; color: var(--accent2); }
    .plan-client { font-size: .82rem; color: var(--muted); margin-top: 2px; }
    .plan-card-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; justify-content: flex-end; }
    .ex-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .ex-table th, .ex-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); text-align: right; }
    .ex-table th { color: var(--muted); }
    .ex-table tr:last-child td { border-bottom: none; }
    .ex-table a { color: var(--accent2); font-size: .78rem; }

    /* REMINDERS */
    .reminders-list { display: flex; flex-direction: column; gap: 12px; }
    .reminder-card { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .reminder-card.today-card { border-color: var(--accent); }
    .reminder-info h3 { font-size: 1rem; margin-bottom: 4px; }
    .reminder-info p  { font-size: .85rem; color: var(--muted); }
    .reminder-tag { font-size: .75rem; background: rgba(233,69,96,.2); color: var(--accent); padding: 2px 8px; border-radius: 10px; margin-left: 8px; }

    /* PAYMENT SUMMARY */
    .pay-summary { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 20px; }

    /* MODAL */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
    #modal-overlay.open { display: flex; }
    #modal-box { background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; }
    #modal-title { color: var(--accent2); font-size: 1.2rem; margin-bottom: 20px; }
    #modal-close { position: absolute; top: 16px; left: 16px; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; line-height: 1; }
    #modal-close:hover { color: var(--accent); }

    /* FORM */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group label { font-size: .85rem; color: var(--muted); }
    .form-group input, .form-group select, .form-group textarea { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: .9rem; font-family: inherit; width: 100%; transition: border-color .2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
    .form-check { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .form-check input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
    .form-check label { font-size: .9rem; color: var(--text); cursor: pointer; }

    /* TYPE TOGGLE */
    .type-toggle { display: flex; gap: 0; margin-bottom: 16px; border-radius: 8px; overflow: hidden; border: 2px solid var(--border); }
    .type-toggle label { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: .9rem; transition: all .2s; background: var(--bg); color: var(--muted); }
    .type-toggle input { display: none; }
    .type-toggle input:checked + label { background: var(--accent); color: #fff; }
    .type-toggle input[value="shift"]:checked + label { background: var(--shift); color: #1a1a2e; }

    /* SHIFT CALC */
    .shift-calc { background: var(--bg); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    .shift-calc-row { display: flex; justify-content: space-between; align-items: center; font-size: .9rem; margin-bottom: 6px; }
    .shift-calc-row:last-child { margin-bottom: 0; }
    .shift-calc-total { font-size: 1.1rem; font-weight: bold; color: var(--accent2); }

    /* EXERCISE BUILDER */
    #ex-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
    .ex-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .ex-item-top { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
    .ex-item-mid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .ex-item input, .ex-item select { background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: .85rem; font-family: inherit; width: 100%; }
    .ex-item input:focus, .ex-item select:focus { outline: none; border-color: var(--accent2); }
    .ex-item-bank { margin-bottom: 6px; }
    .ex-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; }
    .ex-remove:hover { color: var(--accent); background: rgba(233,69,96,.1); }
    .ex-label { font-size: .75rem; color: var(--muted); margin-bottom: 2px; }
    .ex-set-row { display: grid; grid-template-columns: 40px 1fr 1fr 1fr auto; gap: 6px; align-items: center; margin-bottom: 4px; }
    .ex-set-row span { font-size: .78rem; color: var(--muted); text-align: center; }
    .ex-set-row input { font-size: .82rem; padding: 5px 8px; }
    .ex-sets-header { display: grid; grid-template-columns: 40px 1fr 1fr 1fr auto; gap: 6px; margin-bottom: 4px; }
    .ex-sets-header span { font-size: .72rem; color: var(--muted); text-align: center; }
    .ex-add-set { background: none; border: 1px dashed var(--border); color: var(--muted); padding: 4px; border-radius: 6px; cursor: pointer; font-size: .78rem; width: 100%; margin-top: 4px; }
    .ex-add-set:hover { border-color: var(--accent2); color: var(--accent2); }

    /* PLAN BUILDER - SPLIT VIEW */
    .plan-builder { display: flex; gap: 0; min-height: calc(100vh - 100px); }
    .plan-builder-left { width: 320px; min-width: 280px; background: var(--card); border-left: 2px solid var(--border); overflow-y: auto; max-height: calc(100vh - 100px); position: sticky; top: 60px; border-radius: 12px 0 0 12px; }
    .plan-builder-right { flex: 1; padding: 16px; overflow-y: auto; }
    .pb-search { width: 100%; padding: 10px 14px; background: var(--bg); border: none; border-bottom: 2px solid var(--border); color: var(--text); font-size: .85rem; font-family: inherit; }
    .pb-search:focus { outline: none; border-bottom-color: var(--accent2); }
    .pb-group-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; text-align: right; padding: 10px 16px; background: none; border: none; border-bottom: 1px solid rgba(15,52,96,.4); color: var(--text); font-size: .88rem; cursor: pointer; transition: background .2s; }
    .pb-group-btn:hover { background: rgba(233,69,96,.08); }
    .pb-group-btn.active { background: rgba(233,69,96,.12); color: var(--accent); font-weight: 600; }
    .pb-group-btn .pb-count { color: var(--muted); font-size: .75rem; }
    .pb-ex-list { padding: 0; }
    .pb-ex-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px 8px 12px; padding-right: 28px; border-bottom: 1px solid rgba(15,52,96,.3); cursor: pointer; transition: background .2s; font-size: .84rem; }
    .pb-ex-item:hover { background: rgba(168,218,220,.08); }
    .pb-ex-names { flex: 1; }
    .pb-ex-name { color: var(--accent2); }
    .pb-ex-name-en { color: var(--muted); font-size: .75rem; }
    .pb-ex-actions { display: flex; align-items: center; gap: 6px; }
    .pb-ex-add { color: var(--accent); font-size: 1.2rem; opacity: 0; transition: opacity .2s; background: none; border: none; cursor: pointer; padding: 2px 6px; }
    .pb-ex-item:hover .pb-ex-add { opacity: 1; }
    .pb-video-icon { color: var(--accent2); font-size: .8rem; text-decoration: none; }
    .pb-workout-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; flex-wrap: wrap; }
    .pb-workout-tab { padding: 10px 20px; cursor: pointer; border: 2px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0; color: var(--muted); font-size: .9rem; background: none; transition: all .2s; }
    .pb-workout-tab:hover { color: var(--text); }
    .pb-workout-tab.active { color: var(--accent); border-color: var(--border); background: var(--card); margin-bottom: -2px; font-weight: 600; }
    .pb-workout-tab-add { color: var(--accent2); font-size: .85rem; }
    .pb-meta { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
    .pb-meta .form-group { margin-bottom: 0; min-width: 160px; }
    .pb-ex-card { background: var(--card); border: 2px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .pb-ex-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .pb-ex-card-name { font-weight: 600; color: var(--accent2); font-size: .9rem; }
    .pb-ex-card-name a { color: var(--accent2); text-decoration: none; }
    .pb-ex-card-name a:hover { text-decoration: underline; }
    .pb-ex-card-actions { display: flex; gap: 4px; }
    .pb-ex-card-actions button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .85rem; padding: 2px 6px; border-radius: 4px; }
    .pb-ex-card-actions button:hover { color: var(--accent); background: rgba(233,69,96,.1); }
    .pb-empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: .9rem; }
    .pb-save-bar { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 2px solid var(--border); }
    @media (max-width: 768px) {
      .plan-builder { flex-direction: column; }
      .plan-builder-left { width: 100%; max-height: 40vh; position: static; border-left: none; border-bottom: 2px solid var(--border); border-radius: 12px 12px 0 0; }
    }

    /* WORKOUT LOG */
    .log-header { background: var(--bg); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
    .log-header-info { font-size: .9rem; color: var(--muted); line-height: 1.8; }
    .log-header-info strong { color: var(--accent2); }
    .log-exercise { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .log-ex-name { font-weight: 600; color: var(--accent2); font-size: .95rem; margin-bottom: 4px; }
    .log-ex-prescribed { font-size: .78rem; color: var(--muted); margin-bottom: 10px; }
    .log-set-row { display: grid; grid-template-columns: 40px 1fr 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 6px; }
    .log-set-row span { font-size: .8rem; color: var(--muted); text-align: center; }
    .log-set-row input { background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 8px; font-size: .85rem; font-family: inherit; width: 100%; }
    .log-set-row input:focus { outline: none; border-color: var(--accent2); }
    .log-set-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .9rem; padding: 2px 4px; }
    .log-set-remove:hover { color: var(--accent); }
    .log-add-set { background: none; border: 1px dashed var(--border); color: var(--muted); padding: 6px; border-radius: 6px; cursor: pointer; font-size: .8rem; width: 100%; margin-top: 4px; transition: all .2s; }
    .log-add-set:hover { border-color: var(--accent2); color: var(--accent2); }
    .log-add-exercise { background: none; border: 2px dashed var(--border); color: var(--muted); padding: 12px; border-radius: 10px; cursor: pointer; font-size: .85rem; width: 100%; margin-bottom: 16px; transition: all .2s; text-align: center; }
    .log-add-exercise:hover { border-color: var(--accent2); color: var(--accent2); }

    /* LIVE WORKOUT */
    .live-workout { padding: 0 4px; }
    .live-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; margin-bottom: 12px; border-bottom: 2px solid var(--border); position: sticky; top: 56px; background: var(--bg); z-index: 10; }
    .live-progress { color: var(--accent2); font-size: .9rem; font-weight: 600; }
    .live-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .live-ex-name { font-size: 1.15rem; font-weight: 700; color: var(--accent2); margin-bottom: 4px; }
    .live-ex-name a { color: var(--accent2); text-decoration: none; }
    .live-ex-name a:hover { text-decoration: underline; }
    .live-prev { background: rgba(168,218,220,.08); border: 1px solid rgba(168,218,220,.2); border-radius: 10px; padding: 10px 14px; margin: 12px 0; font-size: .82rem; color: var(--muted); }
    .live-prev-title { color: var(--accent2); font-weight: 600; margin-bottom: 4px; font-size: .78rem; }
    .live-prev-sets { display: flex; flex-wrap: wrap; gap: 8px; }
    .live-prev-set { background: var(--bg); padding: 3px 8px; border-radius: 6px; font-size: .78rem; }
    .live-set-row { display: grid; grid-template-columns: 36px 1fr 1fr 1.2fr auto; gap: 8px; align-items: center; margin-bottom: 6px; }
    .live-set-row span { font-size: .82rem; color: var(--muted); text-align: center; }
    .live-set-row input { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; font-size: 16px; font-family: inherit; width: 100%; min-height: 44px; }
    .live-set-row input:focus { outline: none; border-color: var(--accent2); }
    .live-sets-header { display: grid; grid-template-columns: 36px 1fr 1fr 1.2fr auto; gap: 8px; margin-bottom: 6px; }
    .live-sets-header span { font-size: .72rem; color: var(--muted); text-align: center; }
    .live-nav { display: flex; gap: 12px; margin-top: 16px; }
    .live-nav button { flex: 1; padding: 14px; font-size: 1rem; min-height: 48px; }
    .live-swap-btn { background: none; border: 2px dashed var(--border); color: var(--muted); padding: 10px; border-radius: 10px; cursor: pointer; font-size: .85rem; width: 100%; margin-top: 12px; transition: all .2s; text-align: center; }
    .live-swap-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .live-swap-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; justify-content: center; align-items: flex-start; padding-top: 60px; }
    .live-swap-panel { background: var(--card); border: 2px solid var(--border); border-radius: 14px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    .live-swap-panel-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 2px solid var(--border); }

    /* CLIENT PROFILE */
    .cp-back { background: none; border: none; color: var(--accent2); cursor: pointer; font-size: .9rem; padding: 8px 0; margin-bottom: 12px; }
    .cp-back:hover { text-decoration: underline; }
    .cp-header { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .cp-name { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .cp-info { display: flex; flex-wrap: wrap; gap: 16px; color: var(--muted); font-size: .88rem; }
    .cp-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .cp-section { margin-bottom: 20px; }
    .cp-section-title { color: var(--accent); font-size: .95rem; font-weight: 600; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .cp-plan-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; font-size: .88rem; }
    .cp-month { color: var(--accent2); font-size: .85rem; font-weight: 600; margin: 16px 0 8px; }
    .cp-session-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 6px; cursor: pointer; transition: background .2s; font-size: .86rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
    .cp-session-row:hover { background: rgba(168,218,220,.05); }
    .cp-session-detail { background: var(--bg); border: 1px solid var(--border); border-radius: 0 0 10px 10px; padding: 12px; margin-top: -6px; margin-bottom: 6px; font-size: .82rem; }
    .cp-log-ex { margin-bottom: 8px; }
    .cp-log-ex-name { color: var(--accent2); font-weight: 600; font-size: .82rem; }
    .cp-log-sets { color: var(--muted); font-size: .78rem; display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }

    /* DAY POPUP */
    .day-session-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .day-session-info { font-size: .9rem; }
    .day-session-info strong { color: var(--accent2); }
    .day-session-actions { display: flex; gap: 6px; }

    /* LOGIN */
    #login-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .login-box {
      background: var(--card); border: 2px solid var(--border); border-radius: 16px;
      padding: 40px 32px; width: 100%; max-width: 360px; text-align: center;
    }
    .login-box h1 { color: var(--accent); font-size: 1.6rem; margin-bottom: 8px; }
    .login-box p { color: var(--muted); font-size: .9rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%; background: var(--bg); border: 2px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 12px 14px; font-size: 1rem; font-family: inherit;
      text-align: center; margin-bottom: 16px; transition: border-color .2s;
    }
    .login-box input:focus { outline: none; border-color: var(--accent2); }
    .login-error { color: var(--accent); font-size: .85rem; margin-bottom: 12px; min-height: 1.2em; }
    .logout-btn {
      background: none; border: 2px solid var(--border); color: var(--muted);
      padding: 5px 14px; border-radius: 8px; cursor: pointer; font-size: .8rem; transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* TOAST */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card); border: 2px solid var(--accent2); color: var(--text); padding: 12px 24px; border-radius: 12px; z-index: 500; opacity: 0; transition: all .3s; font-size: .95rem; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      nav { flex-direction: column; height: auto; padding: 12px; gap: 8px; }
      .nav-tabs { justify-content: center; }
      .dashboard, .pay-summary { grid-template-columns: 1fr; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .ex-set-row, .ex-sets-header { grid-template-columns: 30px 1fr 1fr auto; }
      .ex-set-row input.ex-set-notes { display: none; }
      .log-set-row { grid-template-columns: 30px 1fr 1fr auto; }
      .log-set-row input.log-notes-input { display: none; }
      main { padding: 14px; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h1>💪 מאמן כושר</h1>
    <p>הזן סיסמה כדי להיכנס</p>
    <form id="login-form" onsubmit="handleLogin(event)">
      <input type="password" id="login-password" placeholder="סיסמה" autocomplete="current-password" autofocus>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="btn" style="width:100%">כניסה</button>
    </form>
  </div>
</div>

<!-- LOADING -->
<div id="loading-overlay" style="display:none">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>מתחבר למסד הנתונים...</p>
    <small>Firebase Firestore</small>
  </div>
</div>

<nav>
  <div class="app-title">💪 מאמן כושר</div>
  <button class="logout-btn" onclick="handleLogout()">התנתק</button>
  <div class="nav-tabs">
    <button class="nav-tab" data-tab="clients">לקוחות</button>
    <button class="nav-tab" data-tab="schedule">לוח זמנים</button>
    <button class="nav-tab" data-tab="exercises">בנק תרגילים</button>
    <button class="nav-tab" data-tab="workouts">תוכניות אימון</button>
    <button class="nav-tab" data-tab="payments">תשלומים</button>
    <button class="nav-tab" data-tab="reminders">תזכורות</button>
  </div>
</nav>

<main>
  <section id="tab-clients">
    <div class="dashboard" id="dashboard"></div>
    <div class="card">
      <div class="section-header"><h2>לקוחות</h2><div style="display:flex;gap:8px;align-items:center"><select class="status-filter" id="client-status-filter" onchange="renderClients()"><option value="all">הכל</option><option value="פעיל">פעיל</option><option value="בהשהיה">בהשהיה</option><option value="הפסיק">הפסיק</option></select><button class="btn" onclick="openAddClient()">+ הוסף לקוח</button></div></div>
      <div class="table-wrap" id="clients-table"></div>
    </div>
  </section>

  <section id="tab-schedule">
    <div class="card" style="margin-bottom:20px">
      <div class="cal-nav">
        <button class="btn btn-ghost btn-sm" onclick="calPrev()">&#8250;</button>
        <h3 id="cal-title"></h3>
        <button class="btn btn-ghost btn-sm" onclick="calNext()">&#8249;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="card">
      <div class="section-header">
        <h2>אימונים</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-ghost" onclick="openAddSession(_calSelected.from,'shift')">+ משמרת</button>
          <button class="btn" onclick="openAddSession(_calSelected.from,'training')">+ אימון</button>
        </div>
      </div>
      <div class="table-wrap" id="sessions-table"></div>
    </div>
  </section>

  <section id="tab-exercises">
    <div class="card">
      <div class="section-header"><h2>בנק תרגילים</h2><button class="btn" onclick="openAddExercise()">+ הוסף תרגיל</button></div>
      <div class="table-wrap" id="exercises-table"></div>
    </div>
  </section>

  <section id="tab-workouts">
    <div class="section-header">
      <h2>תוכניות אימון</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="openPlanBuilder(true)">+ תבנית גנרית</button>
        <button class="btn" onclick="openPlanBuilder(false)">+ תוכנית ללקוח</button>
      </div>
    </div>
    <div id="workouts-content"></div>
  </section>

  <section id="tab-payments">
    <div class="pay-summary" id="pay-summary"></div>
    <div id="pay-filters-container"></div>
    <div class="card">
      <div class="section-header"><h2 id="payments-heading">תשלומים — ממתינים</h2><button class="btn" onclick="openAddPayment()">+ הוסף תשלום</button></div>
      <div class="table-wrap" id="payments-table"></div>
    </div>
  </section>

  <section id="tab-reminders">
    <div class="section-header"><h2>תזכורות — 7 ימים קרובים</h2></div>
    <div class="reminders-list" id="reminders-list"></div>

</main>

<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ===== FIREBASE INIT =====
const firebaseConfig = {
  apiKey: "AIzaSyBKqoqMqqpbaVYTJzTwHxiWGTY44uLFqyY",
  authDomain: "fitness-trainer-84b8c.firebaseapp.com",
  projectId: "fitness-trainer-84b8c",
  storageBucket: "fitness-trainer-84b8c.firebasestorage.app",
  messagingSenderId: "218384462790",
  appId: "1:218384462790:web:c2ae4960ca4888a97bb8c7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== IN-MEMORY CACHE =====
const cache = { clients:[], sessions:[], plans:[], payments:[], exercises:[] };

function load(col) { return cache[col] || []; }

async function saveItem(col, item) {
  const idx = cache[col].findIndex(x => x.id === item.id);
  if (idx >= 0) cache[col][idx] = item;
  else cache[col].push(item);
  await db.collection(col).doc(item.id).set(item);
}

async function deleteItem(col, id) {
  cache[col] = cache[col].filter(x => x.id !== id);
  await db.collection(col).doc(id).delete();
}

async function initDB() {
  const cols = Object.keys(cache);
  await Promise.all(cols.map(async col => {
    const snap = await db.collection(col).get();
    cache[col] = snap.docs.map(doc => ({ ...doc.data(), id: doc.id }));
  }));
}

// ===== HELPERS =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function clientName(id) { const c = load('clients').find(x=>x.id===id); return c ? c.name : '—'; }
function planName(id) { const p = load('plans').find(x=>x.id===id); return p ? p.name : ''; }
function clientOptions(sel='') {
  return load('clients').map(c=>`<option value="${c.id}"${c.id===sel?' selected':''}>${esc(c.name)}</option>`).join('');
}
function planOptionsForClient(clientId, selPlanId='') {
  const plans = load('plans').filter(p => p.clientId === clientId && !p.isTemplate);
  if (!plans.length) return '<option value="">— אין תוכניות —</option>';
  return '<option value="">— ללא תוכנית —</option>' + plans.map(p =>
    `<option value="${p.id}"${p.id===selPlanId?' selected':''}>${esc(p.name)}</option>`
  ).join('');
}
function bankOptions() {
  const exs = load('exercises');
  if (!exs.length) return '';
  const cats = [...new Set(exs.map(e=>e.category))];
  let html = '<option value="">— בחר מהבנק —</option>';
  cats.forEach(cat => {
    html += `<optgroup label="${esc(cat)}">`;
    exs.filter(e=>e.category===cat).forEach(e => { html += `<option value="${e.id}">${esc(e.name)}</option>`; });
    html += '</optgroup>';
  });
  return html;
}
function statusBadgeClass(status) { if (status==='בהשהיה') return 'badge-paused'; if (status==='הפסיק') return 'badge-stopped'; return 'badge-active'; }
let payFilter = { active: false, month: null, fromDate: '', toDate: '', clientId: '' };
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { if (!d) return ''; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
function fmtDateLong(d) { if (!d) return ''; return new Date(d+'T00:00').toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}
function calcShiftHours(startTime, endTime) {
  if (!startTime || !endTime) return 0;
  const [sh, sm] = startTime.split(':').map(Number);
  const [eh, em] = endTime.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins < 0) mins += 24 * 60; // overnight shift
  return mins / 60;
}

// Migrate old exercise format (sets+reps numbers) to new per-set format
function migrateExercise(e) {
  if (e.setsData && e.setsData.length) return e;
  const numSets = +e.sets || 3;
  const reps = +e.reps || 10;
  return {
    name: e.name || '',
    category: e.category || '',
    videoUrl: e.videoUrl || '',
    setsData: Array.from({length: numSets}, () => ({targetReps: reps, weight: '', notes: ''}))
  };
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ===== MODAL =====
let _onModalSubmit = null;
function openModal(title, bodyHTML, onSubmit) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-overlay').classList.add('open');
  _onModalSubmit = onSubmit;
  const form = document.getElementById('modal-form');
  if (form && onSubmit) form.addEventListener('submit', handleModalSubmit);
}
async function handleModalSubmit(e) {
  e.preventDefault();
  const btn = e.target.querySelector('[type=submit]');
  if (btn) { btn.disabled = true; btn.textContent = 'שומר...'; }
  try {
    if (_onModalSubmit) await _onModalSubmit(new FormData(e.target));
    closeModal();
  } catch(err) {
    console.error(err);
    showToast('שגיאה בשמירה. בדוק חיבור לאינטרנט.');
    if (btn) { btn.disabled = false; btn.textContent = 'שמור'; }
  }
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-body').innerHTML = '';
  _onModalSubmit = null;
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ===== TAB NAVIGATION =====
const RENDERERS = { clients:renderClients, schedule:renderSchedule, exercises:renderExercises, workouts:renderWorkouts, payments:renderPayments, reminders:renderReminders };
async function switchTab(name) {
  if (_planBuilder.active && !confirm('יש תוכנית בעריכה — לצאת בלי לשמור?')) return;
  if (_planBuilder.active) _planBuilder.active = false;
  if (_liveWorkout.active) { clearTimeout(_liveWorkout.saveTimer); await liveDoSave(); _liveWorkout.active = false; }
  if (_clientProfile.active) _clientProfile.active = false;
  document.querySelectorAll('section[id^="tab-"]').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  RENDERERS[name]();
}
document.querySelectorAll('.nav-tab').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));

// ========================
// ===== CLIENTS ==========
// ========================
let _clientProfile = { active: false, clientId: '', expandedSession: '' };
function openClientProfile(clientId) { _clientProfile = { active:true, clientId, expandedSession:'' }; renderClients(); }
function closeClientProfile() { _clientProfile = { active:false, clientId:'', expandedSession:'' }; renderClients(); }
function cpToggleSession(sid) { _clientProfile.expandedSession = _clientProfile.expandedSession===sid?'':sid; renderClientProfile(); }

function renderClientProfile() {
  const c = load('clients').find(x=>x.id===_clientProfile.clientId);
  if (!c) { closeClientProfile(); return; }
  const plans = load('plans').filter(p=>p.clientId===c.id);
  const sessions = load('sessions').filter(s=>s.clientId===c.id&&s.type==='training').sort((a,b)=>b.date.localeCompare(a.date));

  // Group sessions by month
  const months = {};
  sessions.forEach(s => { const m=s.date.slice(0,7); if(!months[m])months[m]=[]; months[m].push(s); });
  const monthNames = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

  let plansHtml = plans.length ? plans.map(p => {
    const workouts = getPlanWorkouts(p);
    const totalEx = workouts.reduce((s,w)=>s+w.exercises.length,0);
    return `<div class="cp-plan-row"><strong>${esc(p.name)}</strong> — ${workouts.length} אימונים, ${totalEx} תרגילים</div>`;
  }).join('') : '<div style="color:var(--muted);font-size:.85rem">אין תוכניות</div>';

  let sessionsHtml = '';
  Object.keys(months).sort().reverse().forEach(m => {
    const [y, mo] = m.split('-');
    sessionsHtml += `<div class="cp-month">${monthNames[+mo-1]} ${y}</div>`;
    months[m].forEach(s => {
      const pName = s.planId ? planName(s.planId) : '';
      const hasLog = s.log && s.log.length;
      const isExpanded = _clientProfile.expandedSession === s.id;
      sessionsHtml += `<div class="cp-session-row" onclick="cpToggleSession('${s.id}')" style="${isExpanded?'border-radius:10px 10px 0 0':''}">
        <div>${fmtDate(s.date)} · ${esc(s.time||'')} ${pName?'· '+esc(pName):''}</div>
        <div>${hasLog?'<span class="badge badge-logged">תועד</span>':''} ${isExpanded?'▲':'▼'}</div>
      </div>`;
      if (isExpanded && hasLog) {
        sessionsHtml += '<div class="cp-session-detail">';
        s.log.forEach(ex => {
          const setsText = ex.sets.map((st,i)=>`<span class="live-prev-set">סט${i+1}: ${st.reps||'—'}×${st.weight||'—'}</span>`).join('');
          sessionsHtml += `<div class="cp-log-ex"><div class="cp-log-ex-name">${esc(ex.exerciseName)}</div><div class="cp-log-sets">${setsText}</div></div>`;
        });
        sessionsHtml += '</div>';
      } else if (isExpanded) {
        sessionsHtml += '<div class="cp-session-detail" style="color:var(--muted)">לא תועד</div>';
      }
    });
  });
  if (!sessions.length) sessionsHtml = '<div style="color:var(--muted);font-size:.85rem">אין אימונים</div>';

  document.getElementById('dashboard').innerHTML = '';
  document.getElementById('clients-table').innerHTML = `
    <button class="cp-back" onclick="closeClientProfile()">→ חזרה לרשימה</button>
    <div class="cp-header">
      <div class="cp-name">${esc(c.name)} <span class="badge ${statusBadgeClass(c.status||'פעיל')}">${esc(c.status||'פעיל')}</span></div>
      <div class="cp-info">
        ${c.phone?`<span>📱 ${esc(c.phone)}</span>`:''}
        ${c.email?`<span>📧 ${esc(c.email)}</span>`:''}
        ${c.age?`<span>גיל: ${esc(c.age)}</span>`:''}
        ${c.goals?`<span>🎯 ${esc(c.goals)}</span>`:''}
      </div>
    </div>
    <div class="cp-actions">
      <button class="btn btn-sm" onclick="closeClientProfile();openEditClient('${c.id}')">✏ עריכה</button>
      <button class="btn btn-teal btn-sm" onclick="closeClientProfile();openPlanBuilder(false)">+ תוכנית</button>
    </div>
    <div class="cp-section">
      <div class="cp-section-title">תוכניות אימון</div>
      ${plansHtml}
    </div>
    <div class="cp-section">
      <div class="cp-section-title">היסטוריית אימונים</div>
      ${sessionsHtml}
    </div>`;
}

function renderClients() {
  if (_clientProfile.active) { renderClientProfile(); return; }
  const clients  = load('clients');
  const sessions = load('sessions');
  const payments = load('payments');
  const today    = new Date().toISOString().slice(0,10);
  const statusFilter = document.getElementById('client-status-filter')?.value || 'all';

// ========================
// ===== SCHEDULE =========
// ========================
let calYear, calMonth;
let _calSelected = { from:new Date().toISOString().slice(0,10), to:new Date().toISOString().slice(0,10) };
let _liveWorkout = { active:false, sessionId:'', currentIdx:0, log:[], session:null, previousData:{}, saveTimer:null, showSwapBrowser:false, swapExpandedCat:'' };

function renderSchedule() {
  if (_liveWorkout.active) { renderLiveWorkout(); return; }
  const now = new Date();
  if (calYear === undefined) calYear = now.getFullYear();
  if (calMonth === undefined) calMonth = now.getMonth();
  renderCalendar(); renderSessionsTable();
}
function calPrev() { calMonth--; if (calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if (calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function renderCalendar() {
  const sessions = load('sessions');
  const today    = new Date().toISOString().slice(0,10);
  const monthNames = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  document.getElementById('cal-title').textContent = `${monthNames[calMonth]} ${calYear}`;
  const firstDay = new Date(calYear,calMonth,1).getDay();
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();
  const sessionMap = {};
  sessions.forEach(s => {
    if (!sessionMap[s.date]) sessionMap[s.date] = [];
    sessionMap[s.date].push(s.type || 'training');
  });
  const dayNames = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  let html = dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  for (let i=0;i<firstDay;i++) html+='<div class="cal-day empty-day"></div>';
  for (let d=1;d<=daysInMonth;d++) {
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const types = sessionMap[ds] || [];
    let dots = '';
    if (types.length) {
      const dotHtml = types.slice(0, 5).map(t =>
        `<div class="cal-dot${t === 'shift' ? ' shift-dot' : ''}"></div>`
      ).join('');
      dots = `<div class="cal-dots">${dotHtml}</div>`;
    }
    const inRange = ds>=_calSelected.from && ds<=_calSelected.to;
    const isEdge = ds===_calSelected.from || ds===_calSelected.to;
    html+=`<div class="cal-day${ds===today?' today':''}${isEdge?' selected':''}${inRange&&!isEdge?' week-selected':''}" onclick="handleCalDayClick(event,'${ds}')"><div class="cal-day-num">${d}</div>${dots}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function handleCalDayClick(event, dateStr) {
  if (event.shiftKey && _calSelected.from) {
    // Shift+click: extend range from existing selection to this date
    if (dateStr < _calSelected.from) { _calSelected.from = dateStr; }
    else { _calSelected.to = dateStr; }
  } else {
    // Regular click: select single day
    _calSelected = { from:dateStr, to:dateStr };
  }
  renderCalendar(); renderSessionsTable();
}

function renderSessionsTable() {
  const allSessions = load('sessions');
  const isRange = _calSelected.from !== _calSelected.to;
  const filtered = allSessions.filter(s=>s.date>=_calSelected.from&&s.date<=_calSelected.to)
    .sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:(a.time||a.startTime||'')<(b.time||b.startTime||'')?-1:1);
  const heading = isRange ? `${fmtDate(_calSelected.from)} — ${fmtDate(_calSelected.to)}` : fmtDateLong(_calSelected.from);
  const headingEl = document.querySelector('#tab-schedule .card:last-child .section-header h2');
  if (headingEl) headingEl.textContent = heading;
  if (!filtered.length) { document.getElementById('sessions-table').innerHTML='<div class="empty">אין אימונים בתקופה הזו.</div>'; return; }
  document.getElementById('sessions-table').innerHTML=`<table>
    <thead><tr><th>סוג</th><th>לקוח</th><th>תאריך</th><th>שעה</th><th>פרטים</th><th>תוכנית</th><th>הערות</th><th>פעולות</th></tr></thead>
    <tbody>${filtered.map(s=>{
      const isShift = s.type === 'shift';
      const typeBadge = isShift ? '<span class="badge badge-shift">משמרת</span>' : '🏋️';
      const recurring = s.recurringGroupId ? ' <span class="badge badge-recurring">🔁</span>' : '';
      const logBadge = (s.log && s.log.length) ? ' <span class="badge badge-logged">תועד</span>' : '';
      const clientCol = isShift ? '—' : esc(clientName(s.clientId));
      const planCol = s.planId ? esc(planName(s.planId)) : '—';
      let timeCol, detailsCol;
      if (isShift) {
        timeCol = `${esc(s.startTime||'')}–${esc(s.endTime||'')}`;
        const hrs = calcShiftHours(s.startTime, s.endTime);
        const total = s.hourlyRate ? `₪${(hrs * +s.hourlyRate).toFixed(0)}` : '';
        detailsCol = `${hrs.toFixed(1)} שעות${total ? ' · ' + total : ''}`;
      } else {
        timeCol = esc(s.time);
        detailsCol = `${esc(s.duration)} דק׳`;
      }
      return `<tr>
      <td>${typeBadge}${recurring}</td>
      <td>${clientCol}</td><td>${fmtDate(s.date)}</td>
      <td>${timeCol}</td><td>${detailsCol}</td>
      <td>${planCol}</td>
      <td>${esc(s.notes)}${logBadge}</td>
      <td class="actions">
        ${!isShift ? `<button class="btn btn-log btn-sm" onclick="openLiveWorkout('${s.id}')">📋</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="openEditSession('${s.id}')">עריכה</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSession('${s.id}')">מחק</button>
      </td></tr>`;
    }).join('')}</tbody></table>`;
}

      </div>
    </div>

    <div class="form-group"><label>תאריך *</label><input name="date" type="date" value="${esc(s.date||'')}" required></div>

    <!-- Training: single time + duration -->
    <div id="session-time-training" ${isShift?'style="display:none"':''}>
      <div class="form-row">
        <div class="form-group"><label>שעה *</label><input name="time" type="time" value="${esc(s.time||'')}"></div>
        <div class="form-group"><label>משך (דקות)</label><input name="duration" type="number" min="1" value="${esc(s.duration||60)}"></div>

        <div class="form-group"><label>שעת סיום *</label><input name="endTime" type="time" value="${esc(s.endTime||'')}" onchange="calcShiftDisplay()"></div>
      </div>
      <div class="form-group"><label>תעריף לשעה (₪)</label><input name="hourlyRate" type="number" min="0" step="0.5" value="${esc(s.hourlyRate||'')}" onchange="calcShiftDisplay()" oninput="calcShiftDisplay()"></div>
      <div class="shift-calc" id="shift-calc" style="${(s.startTime && s.endTime) ? '' : 'display:none'}">
        <div class="shift-calc-row"><span>סה"כ שעות:</span><span id="shift-hours">0</span></div>
        <div class="shift-calc-row"><span>סכום למשמרת:</span><span class="shift-calc-total" id="shift-total">₪0</span></div>
      </div>
    </div>

    <div class="form-group"><label>הערות</label><textarea name="notes" rows="2">${esc(s.notes||'')}</textarea></div>

    <div class="form-check">
      <input type="checkbox" id="recurring-cb" name="recurring" ${s.isRecurring?'checked':''} onchange="toggleRecurringFields()">
      <label for="recurring-cb">חוזר כל שבוע (קבוע)</label>
    </div>
    <div class="form-group" id="recurring-weeks-group" style="${s.isRecurring?'':'display:none'}">
      <label>מספר שבועות</label>
      <input name="recurringWeeks" type="number" min="1" max="52" value="12">
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-ghost" onclick="closeModal()">ביטול</button>

}

function toggleSessionType() {
  const isShift = document.getElementById('type-shift').checked;
  document.getElementById('session-training-fields').style.display = isShift ? 'none' : '';
  document.getElementById('session-time-training').style.display = isShift ? 'none' : '';
  document.getElementById('session-time-shift').style.display = isShift ? '' : 'none';
}

function updatePlanDropdown() {
  const clientId = document.getElementById('session-client-sel')?.value || '';
  const planSel = document.getElementById('session-plan-sel');
  if (planSel) planSel.innerHTML = planOptionsForClient(clientId);
  updateWorkoutDropdown();
}
function updateWorkoutDropdown() {
  const planId = document.getElementById('session-plan-sel')?.value || '';
  const group = document.getElementById('session-workout-group');
  const sel = document.getElementById('session-workout-sel');
  if (!planId) { if(group)group.style.display='none'; return; }
  const plan = load('plans').find(p=>p.id===planId);
  if (!plan) { if(group)group.style.display='none'; return; }
  const workouts = getPlanWorkouts(plan);
  if (workouts.length <= 1) { if(group)group.style.display='none'; if(sel)sel.innerHTML='<option value="0">'+esc(workouts[0]?.name||'אימון A')+'</option>'; return; }
  if(group)group.style.display='';
  if(sel)sel.innerHTML=workouts.map((w,i)=>`<option value="${i}">${esc(w.name)}</option>`).join('');
}
function workoutOptionsForPlan(planId, selIdx) {
  const plan = load('plans').find(p=>p.id===planId);
  if (!plan) return '';
  const workouts = getPlanWorkouts(plan);
  return workouts.map((w,i)=>`<option value="${i}"${i===selIdx?' selected':''}>${esc(w.name)}</option>`).join('');
}

function calcShiftDisplay() {
  const startTime = document.querySelector('[name=startTime]')?.value;
  const endTime = document.querySelector('[name=endTime]')?.value;
  const rate = +document.querySelector('[name=hourlyRate]')?.value || 0;
  const calcDiv = document.getElementById('shift-calc');
  if (!startTime || !endTime) { calcDiv.style.display = 'none'; return; }
  calcDiv.style.display = '';
  const hrs = calcShiftHours(startTime, endTime);
  document.getElementById('shift-hours').textContent = hrs.toFixed(1);
  document.getElementById('shift-total').textContent = rate ? `₪${(hrs * rate).toFixed(0)}` : '—';
}

function toggleRecurringFields() {
  const checked = document.getElementById('recurring-cb').checked;
  document.getElementById('recurring-weeks-group').style.display = checked ? '' : 'none';
}

function openAddSession(date, type) {
  if (type === 'training' && !load('clients').length) { alert('יש להוסיף לקוח לפני הוספת אימון.'); return; }
  const title = type === 'shift' ? 'הוסף משמרת' : 'הוסף אימון';
  openModal(title, sessionForm({date:date||''}, type||'training'), async fd => {
    const sessionType = fd.get('type');
    const isShift = sessionType === 'shift';
    const baseSession = {
      id: uid(),
      type: sessionType,
      clientId: isShift ? '' : fd.get('clientId'),
      planId: isShift ? '' : (fd.get('planId') || ''),
      workoutIdx: isShift ? 0 : +(fd.get('workoutIdx') || 0),
      date: fd.get('date'),
      // Training fields
      time: isShift ? '' : fd.get('time'),
      duration: isShift ? '' : fd.get('duration'),
      // Shift fields
      startTime: isShift ? fd.get('startTime') : '',
      endTime: isShift ? fd.get('endTime') : '',
      hourlyRate: isShift ? fd.get('hourlyRate') : '',
      notes: fd.get('notes'),
      isRecurring: false,
      recurringGroupId: ''
    };

    const isRecurring = fd.get('recurring') === 'on';
    if (isRecurring) {
      const weeks = Math.min(+(fd.get('recurringWeeks') || 12), 52);
      const groupId = uid();
      baseSession.isRecurring = true;
      baseSession.recurringGroupId = groupId;
      await saveItem('sessions', baseSession);
      const promises = [];
      for (let w = 1; w < weeks; w++) {
        promises.push(saveItem('sessions', {
          ...baseSession,
          id: uid(),
          date: addDays(baseSession.date, w * 7)
        }));
      }
      await Promise.all(promises);
      showToast(`נוצרו ${weeks} ${isShift ? 'משמרות' : 'אימונים'} קבועים ✓`);
    } else {
      await saveItem('sessions', baseSession);
    }
    renderCalendar(); renderSessionsTable();
  });
}

function openEditSession(id) {

function editFutureSessions(id) {
  const s = load('sessions').find(x=>x.id===id);
  openModal('עריכת סדרה', sessionForm(s), async fd => {
    const sessionType = fd.get('type');
    const isShift = sessionType === 'shift';
    const futureSessions = load('sessions').filter(
      x => x.recurringGroupId === s.recurringGroupId && x.date >= s.date
    );
    const updates = {
      type: sessionType,
      clientId: isShift ? '' : fd.get('clientId'),
      planId: isShift ? '' : (fd.get('planId') || ''),
      workoutIdx: isShift ? 0 : +(fd.get('workoutIdx') || 0),
      time: isShift ? '' : fd.get('time'),
      duration: isShift ? '' : fd.get('duration'),
      startTime: isShift ? fd.get('startTime') : '',
      endTime: isShift ? fd.get('endTime') : '',
      hourlyRate: isShift ? fd.get('hourlyRate') : '',
      notes: fd.get('notes')
    };
    await Promise.all(futureSessions.map(fs => {
      Object.assign(fs, updates);
      return saveItem('sessions', fs);
    }));
    showToast(`עודכנו ${futureSessions.length} פריטים ✓`);
    renderCalendar(); renderSessionsTable();
  });
}

async function deleteSession(id) {
  const s = load('sessions').find(x=>x.id===id);
  if (s && s.recurringGroupId) {
    openModal('מחיקה', `
      <p style="color:var(--muted);margin-bottom:16px">חלק מסדרה חוזרת. מה למחוק?</p>

        <button class="btn btn-danger" onclick="closeModal();deleteSingleSession('${id}')">זה בלבד</button>
        <button class="btn btn-danger" onclick="closeModal();deleteFutureSessions('${id}')">כל העתידיים</button>
        <button class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      </div>
    `, null);
    return;
  }
  if (!confirm('למחוק?')) return;
  await deleteItem('sessions', id);
  renderCalendar(); renderSessionsTable();
}

async function deleteSingleSession(id) {
  await deleteItem('sessions', id);
  renderCalendar(); renderSessionsTable();
  showToast('נמחק ✓');
}

async function deleteFutureSessions(id) {
  const s = load('sessions').find(x=>x.id===id);
  if (!s) return;
  const toDelete = load('sessions').filter(
    x => x.recurringGroupId === s.recurringGroupId && x.date >= s.date
  );
  await Promise.all(toDelete.map(x => deleteItem('sessions', x.id)));
  showToast(`נמחקו ${toDelete.length} פריטים ✓`);
  renderCalendar(); renderSessionsTable();
}

let _logData = [];
let _logSessionId = '';

// ===== LIVE WORKOUT =====
function openLiveWorkout(sessionId) {
  const s = load('sessions').find(x=>x.id===sessionId);
  if (!s) return;
  let log;
  if (s.log && s.log.length) {
    log = JSON.parse(JSON.stringify(s.log));
  } else if (s.planId) {
    const plan = load('plans').find(p=>p.id===s.planId);
    if (plan) {
      const workouts = getPlanWorkouts(plan);
      const workout = workouts[s.workoutIdx||0] || workouts[0];
      if (workout && workout.exercises.length) {
        log = workout.exercises.map(e => {
          const ex = migrateExercise(e);
          return { exerciseName:ex.name, category:ex.category||'', videoUrl:ex.videoUrl||'',
            sets:ex.setsData.map(sd=>({ targetReps:+sd.targetReps||0, reps:'', weight:sd.weight||'', notes:sd.notes||'' })) };
        });
      } else { log = []; }
    } else { log = []; }
  } else { log = []; }
  _liveWorkout = { active:true, sessionId, currentIdx:0, log, session:s, previousData:{}, saveTimer:null, showSwapBrowser:false, swapExpandedCat:'' };
  loadPreviousSessionData(s.clientId, log);
  renderSchedule();
}
function loadPreviousSessionData(clientId, log) {
  const past = load('sessions').filter(s=>s.clientId===clientId&&s.log&&s.log.length&&s.id!==_liveWorkout.sessionId).sort((a,b)=>b.date.localeCompare(a.date));
  const prev = {};
  for (const ex of log) {
    for (const s of past) {
      const entry = s.log.find(l=>l.exerciseName===ex.exerciseName);
      if (entry) { prev[ex.exerciseName] = { sets:entry.sets, date:s.date }; break; }
    }
  }
  _liveWorkout.previousData = prev;
}
async function closeLiveWorkout() {
  clearTimeout(_liveWorkout.saveTimer);
  await liveDoSave();
  _liveWorkout.active = false;
  renderSchedule();
  showToast('האימון נשמר ✓');
}
function liveAutoSave() {
  clearTimeout(_liveWorkout.saveTimer);
  _liveWorkout.saveTimer = setTimeout(()=>liveDoSave(), 1000);
}
async function liveDoSave() {
  const s = _liveWorkout.session;
  if (!s) return;
  s.log = _liveWorkout.log.filter(ex=>ex.exerciseName.trim()).map(ex=>({
    exerciseName:ex.exerciseName.trim(), category:ex.category||'', videoUrl:ex.videoUrl||'',
    sets:ex.sets.map(st=>({ targetReps:+st.targetReps||0, reps:+st.reps||0, weight:st.weight||'', notes:(st.notes||'').trim() }))
  }));
  await saveItem('sessions', s);
}

function renderLiveWorkout() {
  const s = _liveWorkout.session;
  const total = _liveWorkout.log.length;
  const clientN = s.clientId ? clientName(s.clientId) : '';
  document.getElementById('cal-title').textContent = '';
  document.querySelector('#tab-schedule .cal-nav')?.style && (document.querySelector('#tab-schedule .cal-nav').style.display='none');
  document.getElementById('sessions-table-container')?.remove();

  const mainEl = document.querySelector('#tab-schedule');
  // Remove calendar grid if present
  const existingBuilder = mainEl.querySelector('.live-workout');
  if (!existingBuilder) {
    mainEl.innerHTML = `<div class="live-workout">
      <div class="live-header">
        <div><span class="live-progress">תרגיל ${_liveWorkout.currentIdx+1} מתוך ${total}</span>${clientN?` · <span style="color:var(--muted);font-size:.82rem">${esc(clientN)}</span>`:''}</div>
        <button class="btn btn-sm" onclick="closeLiveWorkout()">סיים אימון ✓</button>
      </div>
      <div id="live-card-container">${renderLiveCard()}</div>
      ${_liveWorkout.showSwapBrowser?renderLiveSwapOverlay():''}
    </div>`;
  } else {
    mainEl.innerHTML = `<div class="live-workout">
      <div class="live-header">
        <div><span class="live-progress">תרגיל ${_liveWorkout.currentIdx+1} מתוך ${total}</span>${clientN?` · <span style="color:var(--muted);font-size:.82rem">${esc(clientN)}</span>`:''}</div>
        <button class="btn btn-sm" onclick="closeLiveWorkout()">סיים אימון ✓</button>
      </div>
      <div id="live-card-container">${renderLiveCard()}</div>
      ${_liveWorkout.showSwapBrowser?renderLiveSwapOverlay():''}
    </div>`;
  }
}

function renderLiveCard() {
  const idx = _liveWorkout.currentIdx;
  const total = _liveWorkout.log.length;
  if (!total) return '<div class="pb-empty">אין תרגילים באימון</div>';
  const ex = _liveWorkout.log[idx];
  const prev = _liveWorkout.previousData[ex.exerciseName];

  let prevHtml = '';
  if (prev) {
    const prevSets = prev.sets.map((st,i)=>`<span class="live-prev-set">סט${i+1}: ${st.reps||'—'}×${st.weight||'—'}</span>`).join('');
    prevHtml = `<div class="live-prev"><div class="live-prev-title">פעם קודמת (${fmtDate(prev.date)})</div><div class="live-prev-sets">${prevSets}</div></div>`;
  }

  const setsHtml = ex.sets.map((s,si)=>`<div class="live-set-row">
    <span>סט ${si+1}</span>
    <input type="number" min="0" placeholder="${s.targetReps||'חזרות'}" value="${s.reps||''}" oninput="_liveWorkout.log[${idx}].sets[${si}].reps=this.value;liveAutoSave()">
    <input type="number" min="0" step="0.5" placeholder="${s.weight?s.weight:'משקל'}" value="${s.weight||''}" oninput="_liveWorkout.log[${idx}].sets[${si}].weight=this.value;liveAutoSave()">
    <input placeholder="הערות" value="${esc(s.notes||'')}" oninput="_liveWorkout.log[${idx}].sets[${si}].notes=this.value;liveAutoSave()">
    <button class="ex-remove" onclick="liveRemoveSet(${idx},${si})" style="font-size:.9rem;min-height:44px">✕</button>
  </div>`).join('');

  return `<div class="live-card">
    <div class="live-ex-name">${ex.videoUrl?`<a href="${esc(ex.videoUrl)}" target="_blank">${esc(ex.exerciseName)}</a>`:esc(ex.exerciseName)}
      ${ex.category?` <span class="badge badge-cat">${esc(ex.category)}</span>`:''}
    </div>
    ${ex.videoUrl?`<a href="${esc(ex.videoUrl)}" target="_blank" style="color:var(--accent2);font-size:.8rem">▶ סרטון</a>`:''}
    ${prevHtml}
    <div style="margin:12px 0 6px;color:var(--muted);font-size:.78rem;font-weight:600">סטים</div>
    <div class="live-sets-header"><span></span><span>חזרות</span><span>משקל</span><span>הערות</span><span></span></div>
    ${setsHtml}
    <button class="ex-add-set" onclick="liveAddSet(${idx})" style="min-height:40px">+ הוסף סט</button>
    <button class="live-swap-btn" onclick="liveShowSwap()">🔄 החלף תרגיל</button>
  </div>
  <div class="live-nav">
    <button class="btn btn-ghost" onclick="livePrev()" ${idx===0?'disabled':''}>← הקודם</button>
    <button class="btn" onclick="liveNext()" ${idx>=total-1?'disabled':''}>${idx>=total-1?'סיום':'הבא →'}</button>
  </div>`;
}

function liveNext() { if(_liveWorkout.currentIdx<_liveWorkout.log.length-1){_liveWorkout.currentIdx++;updateLiveCard();} }
function livePrev() { if(_liveWorkout.currentIdx>0){_liveWorkout.currentIdx--;updateLiveCard();} }
function updateLiveCard() {
  const container = document.getElementById('live-card-container');
  if(container) container.innerHTML = renderLiveCard();
  document.querySelector('.live-progress').textContent = `תרגיל ${_liveWorkout.currentIdx+1} מתוך ${_liveWorkout.log.length}`;
}
function liveAddSet(idx) {
  _liveWorkout.log[idx].sets.push({targetReps:'',reps:'',weight:'',notes:''});
  updateLiveCard(); liveAutoSave();
}
function liveRemoveSet(idx, si) {
  _liveWorkout.log[idx].sets.splice(si,1);
  if(!_liveWorkout.log[idx].sets.length) _liveWorkout.log[idx].sets.push({targetReps:'',reps:'',weight:'',notes:''});
  updateLiveCard(); liveAutoSave();
}
function liveShowSwap() { _liveWorkout.showSwapBrowser=true; _liveWorkout.swapExpandedCat=''; renderLiveWorkout(); }
function liveHideSwap() { _liveWorkout.showSwapBrowser=false; renderLiveWorkout(); }
function renderLiveSwapOverlay() {
  const allExercises = load('exercises');
  const cats = EX_CATS.filter(cat=>allExercises.some(e=>e.category===cat));
  let listHtml;
  if (_liveWorkout.swapExpandedCat) {
    const exs = allExercises.filter(e=>e.category===_liveWorkout.swapExpandedCat);
    listHtml = exs.map(e=>`<div class="pb-ex-item" onclick="liveConfirmSwap('${e.id}')">
      <div class="pb-ex-names"><div class="pb-ex-name">${esc(e.name)}</div>${e.nameEn?`<div class="pb-ex-name-en">${esc(e.nameEn)}</div>`:''}</div>
      <div class="pb-ex-actions"><button class="pb-ex-add" style="opacity:1">+</button></div>
    </div>`).join('');
  } else { listHtml = ''; }
  const catsHtml = cats.map(cat=>{
    const count = allExercises.filter(e=>e.category===cat).length;
    const isOpen = _liveWorkout.swapExpandedCat===cat;
    return `<button class="pb-group-btn${isOpen?' active':''}" onclick="_liveWorkout.swapExpandedCat=_liveWorkout.swapExpandedCat==='${cat}'?'':'${cat}';renderLiveWorkout()"><span>${esc(cat)}</span><span class="pb-count">${count}</span></button>${isOpen?listHtml:''}`;
  }).join('');
  return `<div class="live-swap-overlay" onclick="liveHideSwap()">
    <div class="live-swap-panel" onclick="event.stopPropagation()">
      <div class="live-swap-panel-header"><span style="font-weight:600;color:var(--accent2)">החלף תרגיל</span><button class="ex-remove" onclick="liveHideSwap()" style="font-size:1.2rem">✕</button></div>
      ${catsHtml}
    </div>
  </div>`;
}
function liveConfirmSwap(exId) {
  const ex = load('exercises').find(e=>e.id===exId);
  if(!ex) return;
  const idx = _liveWorkout.currentIdx;
  const old = _liveWorkout.log[idx];
  _liveWorkout.log[idx] = { exerciseName:ex.name, category:ex.category||'', videoUrl:ex.videoUrl||'',
    sets:old.sets.length?old.sets:[{targetReps:10,reps:'',weight:'',notes:''}] };
  // Lookup previous data for new exercise
  const past = load('sessions').filter(s=>s.clientId===_liveWorkout.session.clientId&&s.log&&s.log.length&&s.id!==_liveWorkout.sessionId).sort((a,b)=>b.date.localeCompare(a.date));
  for (const s of past) {
    const entry = s.log.find(l=>l.exerciseName===ex.name);
    if (entry) { _liveWorkout.previousData[ex.name] = { sets:entry.sets, date:s.date }; break; }
  }
  _liveWorkout.showSwapBrowser = false;
  liveAutoSave();
  renderLiveWorkout();
  showToast(`הוחלף ל-${ex.name} ✓`);
}

function openWorkoutLog(sessionId) {
  const s = load('sessions').find(x => x.id === sessionId);
  if (!s) return;
  _logSessionId = sessionId;

  if (s.log && s.log.length) {
    _logData = JSON.parse(JSON.stringify(s.log));
  } else if (s.planId) {
    const plan = load('plans').find(p => p.id === s.planId);
    if (plan) {
      const workouts = getPlanWorkouts(plan);
      const workout = workouts[s.workoutIdx||0] || workouts[0];
      if (workout && workout.exercises.length) {
        _logData = workout.exercises.map(e => {
          const ex = migrateExercise(e);
          return {
            exerciseName: ex.name,
            category: ex.category || '',
            prescribedSets: ex.setsData.length,
            sets: ex.setsData.map(sd => ({
              targetReps: +sd.targetReps || 0,
              reps: '',
              weight: sd.weight || '',
              notes: sd.notes || ''
            }))
          };
        });
      } else { _logData = []; }
    } else {
      _logData = [];
    }
  } else {
    _logData = [];
  }

  const clientN = s.clientId ? clientName(s.clientId) : '';
  const planN = s.planId ? planName(s.planId) : '';

  let html = `<div class="log-header">
    <div class="log-header-info">
      ${clientN ? `<strong>לקוח:</strong> ${esc(clientN)}<br>` : ''}
      <strong>תאריך:</strong> ${fmtDateLong(s.date)} · ${esc(s.time)}
      ${planN ? `<br><strong>תוכנית:</strong> ${esc(planN)}` : ''}
    </div>
  </div>`;
  html += `<div id="log-exercises-container">${renderLogExercises()}</div>`;
  html += `<button type="button" class="log-add-exercise" onclick="addLogExercise()">+ הוסף תרגיל</button>`;
  html += `<div class="form-actions">
    <button type="button" class="btn btn-ghost" onclick="closeModal()">ביטול</button>
    <button type="button" class="btn btn-log" onclick="saveWorkoutLog()">💾 שמור יומן</button>
  </div>`;

  openModal('📋 יומן אימון', html, null);
}

function renderLogExercises() {
  if (!_logData.length) return '<div style="color:var(--muted);font-size:.85rem;padding:12px 0;text-align:center">אין תרגילים — לחץ ״הוסף תרגיל״</div>';
  return _logData.map((ex, ei) => {
    const setsHtml = ex.sets.map((set, si) => {
      const target = set.targetReps ? `(מטרה: ${set.targetReps})` : '';
      return `<div class="log-set-row">
        <span>סט ${si+1}</span>
        <input type="number" min="0" placeholder="חזרות ${target}" value="${set.reps||''}" oninput="_logData[${ei}].sets[${si}].reps=this.value">
        <input type="number" min="0" step="0.5" placeholder="משקל (ק״ג)" value="${set.weight||''}" oninput="_logData[${ei}].sets[${si}].weight=this.value">
        <input class="log-notes-input" placeholder="הערות" value="${esc(set.notes||'')}" oninput="_logData[${ei}].sets[${si}].notes=this.value">
        <button type="button" class="log-set-remove" onclick="removeLogSet(${ei},${si})">✕</button>
      </div>`;
    }).join('');
    return `<div class="log-exercise">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="flex:1">
          <input style="background:transparent;border:none;color:var(--accent2);font-weight:600;font-size:.95rem;padding:0;width:100%" value="${esc(ex.exerciseName)}" oninput="_logData[${ei}].exerciseName=this.value" placeholder="שם התרגיל">
        </div>
        <button type="button" class="ex-remove" onclick="removeLogExercise(${ei})">✕</button>
      </div>
      ${setsHtml}
      <button type="button" class="log-add-set" onclick="addLogSet(${ei})">+ הוסף סט</button>
    </div>`;
  }).join('');
}

function addLogSet(exIdx) {
  _logData[exIdx].sets.push({ targetReps: 0, reps: '', weight: '', notes: '' });
  document.getElementById('log-exercises-container').innerHTML = renderLogExercises();
}
function removeLogSet(exIdx, setIdx) {
  _logData[exIdx].sets.splice(setIdx, 1);
  if (!_logData[exIdx].sets.length) _logData[exIdx].sets.push({ targetReps: 0, reps: '', weight: '', notes: '' });
  document.getElementById('log-exercises-container').innerHTML = renderLogExercises();
}
function addLogExercise() {
  _logData.push({ exerciseName: '', category: '', sets: [{ targetReps: 0, reps: '', weight: '', notes: '' }] });
  document.getElementById('log-exercises-container').innerHTML = renderLogExercises();
}
function removeLogExercise(exIdx) {
  _logData.splice(exIdx, 1);
  document.getElementById('log-exercises-container').innerHTML = renderLogExercises();
}

async function saveWorkoutLog() {
  const s = load('sessions').find(x => x.id === _logSessionId);
  if (!s) return;
  const cleanLog = _logData
    .filter(ex => ex.exerciseName.trim())
    .map(ex => ({
      exerciseName: ex.exerciseName.trim(),
      category: ex.category || '',
      videoUrl: ex.videoUrl || '',
      sets: ex.sets.map(set => ({
        targetReps: +set.targetReps || 0,
        reps: +set.reps || 0,
        weight: +set.weight || 0,
        notes: (set.notes || '').trim()
      }))
    }));
  s.log = cleanLog;
  await saveItem('sessions', s);
  closeModal();
  renderCalendar(); renderSessionsTable();
  showToast('היומן נשמר ✓');
}

function openAddExercise() {

}
function openEditExercise(id) {

async function deleteExercise(id) {

}
