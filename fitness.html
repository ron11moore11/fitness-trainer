// ========================
// ===== WORKOUT PLANS ====
// ========================
// New exercise format: { name, nameEn, category, videoUrl, setsData: [{targetReps, weight, notes}] }
// Plan builder state
let _planBuilder = { active:false, editingId:'', isTemplate:false, clientId:'', planName:'', workouts:[], activeWorkoutIdx:0, expandedCategory:'', searchTerm:'' };

// Backward compat: old plans have exercises[], new plans have workouts[]
function getPlanWorkouts(plan) {
  if (plan.workouts) return plan.workouts;
  return [{ name:'אימון A', exercises:(plan.exercises||[]).map(migrateExercise) }];
}

function renderWorkouts() {
  if (_planBuilder.active) { renderPlanBuilder(); return; }
  const plans = load('plans');
  const templates = plans.filter(p=>p.isTemplate);
  const assigned  = plans.filter(p=>!p.isTemplate);
  let html = '';
  if (templates.length) { html+='<div class="sub-header">תבניות גנריות</div><div class="plans-grid">'+templates.map(planCardHTML).join('')+'</div>'; }
  if (assigned.length)  { html+='<div class="sub-header">תוכניות ללקוחות</div><div class="plans-grid">'+assigned.map(planCardHTML).join('')+'</div>'; }
  if (!plans.length)    { html='<div class="empty">אין תוכניות אימון עדיין.</div>'; }
  document.getElementById('workouts-content').innerHTML = html;
}

function planCardHTML(p) {
  const workouts = getPlanWorkouts(p);
  const workoutSections = workouts.map(w => {
    const exercises = w.exercises.map(migrateExercise);
    if (!exercises.length) return `<div style="color:var(--muted);font-size:.82rem;margin:4px 0">${esc(w.name)}: אין תרגילים</div>`;
    const exRows = exercises.map(e => {
      const repsDisplay = e.setsData.map(s => s.targetReps).join('/');
      const weightsDisplay = e.setsData.some(s => s.weight) ? e.setsData.map(s => s.weight || '—').join('/') : '—';
      return `<tr><td>${esc(e.category||'—')}</td><td>${e.videoUrl?`<a href="${esc(e.videoUrl)}" target="_blank" style="color:var(--accent2)">${esc(e.name)}</a>`:esc(e.name)}</td><td>${e.setsData.length}</td><td>${repsDisplay}</td><td>${weightsDisplay}</td></tr>`;
    }).join('');
    return `${workouts.length>1?`<div style="color:var(--accent);font-size:.82rem;font-weight:600;margin:8px 0 4px">${esc(w.name)}</div>`:''}
      <table class="ex-table"><thead><tr><th>קטגוריה</th><th>תרגיל</th><th>סטים</th><th>חזרות</th><th>משקל</th></tr></thead><tbody>${exRows}</tbody></table>`;
  }).join('');
  const totalEx = workouts.reduce((s,w)=>s+w.exercises.length,0);
  const assignBtn = p.isTemplate
    ? `<button class="btn btn-teal btn-sm" onclick="openAssignTemplate('${p.id}')">הקצה ללקוח</button>`
    : `<button class="btn wa-btn btn-sm" onclick="sendPlanToWhatsApp('${p.id}')">📲 שלח</button>`;
  return `<div class="plan-card${p.isTemplate?' tmpl-card':''}">
    <div class="plan-card-header">
      <div>
        <div class="plan-name">${esc(p.name)}</div>
        <div class="plan-client">${p.isTemplate?'<span class="badge badge-tmpl">תבנית גנרית</span>':'לקוח: '+esc(clientName(p.clientId))}</div>
      </div>
    </div>
    ${totalEx?workoutSections:'<div style="color:var(--muted);font-size:.82rem">אין תרגילים</div>'}
    <div class="plan-card-actions">
      <button class="btn btn-ghost btn-sm" onclick="openPlanBuilder(false,'${p.id}')">עריכה</button>
      <button class="btn btn-teal btn-sm" onclick="exportPlanPDF(load('plans').find(x=>x.id==='${p.id}'))">📄 PDF</button>
      ${assignBtn}
      <button class="btn btn-danger btn-sm" onclick="deletePlan('${p.id}')">מחק</button>
    </div></div>`;
}

// ===== PLAN BUILDER =====
function openPlanBuilder(isTemplate=false, existingId='') {
  if (existingId) {
    const p = load('plans').find(x=>x.id===existingId);
    if (!p) return;
    _planBuilder = { active:true, editingId:existingId, isTemplate:p.isTemplate, clientId:p.clientId||'', planName:p.name,
      workouts:JSON.parse(JSON.stringify(getPlanWorkouts(p))), activeWorkoutIdx:0, expandedCategory:'', searchTerm:'' };
  } else {
    _planBuilder = { active:true, editingId:'', isTemplate, clientId:'', planName:'',
      workouts:[{name:'אימון A', exercises:[]}], activeWorkoutIdx:0, expandedCategory:'', searchTerm:'' };
  }
  renderWorkouts();
}
function closePlanBuilder() {
  _planBuilder.active = false;
  renderWorkouts();
}

function renderPlanBuilder() {
  document.getElementById('workouts-content').innerHTML = `<div class="plan-builder">
    <div class="plan-builder-left">
      <input class="pb-search" placeholder="חפש תרגיל..." value="${esc(_planBuilder.searchTerm)}" oninput="pbSearchExercises(this.value)">
      <div id="pb-browser">${renderExerciseBrowser()}</div>
    </div>
    <div class="plan-builder-right">
      <div class="pb-meta">
        <div class="form-group"><label>שם התוכנית *</label><input id="pb-plan-name" value="${esc(_planBuilder.planName)}" oninput="_planBuilder.planName=this.value" required></div>
        <div class="form-group" id="pb-client-group" ${_planBuilder.isTemplate?'style="display:none"':''}>
          <label>לקוח</label><select id="pb-client-sel" onchange="_planBuilder.clientId=this.value"><option value="">— בחר לקוח —</option>${clientOptions(_planBuilder.clientId)}</select>
        </div>
        <div class="form-group" style="min-width:auto;display:flex;align-items:center;gap:6px;padding-top:22px">
          <input type="checkbox" id="pb-tmpl-cb" ${_planBuilder.isTemplate?'checked':''} onchange="_planBuilder.isTemplate=this.checked;document.getElementById('pb-client-group').style.display=this.checked?'none':''">
          <label for="pb-tmpl-cb" style="margin:0;font-size:.82rem">תבנית גנרית</label>
        </div>
      </div>
      ${renderWorkoutTabs()}
      <div id="pb-workout-content">${renderWorkoutExercises()}</div>
      <div class="pb-save-bar">
        <button class="btn btn-ghost" onclick="if(confirm('לבטל את העריכה?'))closePlanBuilder()">ביטול</button>
        <button class="btn" onclick="savePlanFromBuilder()">שמור תוכנית</button>
      </div>
    </div>
  </div>`;
}

function renderExerciseBrowser() {
  const allExercises = load('exercises');
  const search = _planBuilder.searchTerm.toLowerCase();
  if (search) {
    const filtered = allExercises.filter(e => (e.name||'').toLowerCase().includes(search) || (e.nameEn||'').toLowerCase().includes(search));
    if (!filtered.length) return '<div class="pb-empty">לא נמצאו תרגילים</div>';
    return '<div class="pb-ex-list">' + filtered.map(e => pbExItemHTML(e)).join('') + '</div>';
  }
  const cats = EX_CATS.filter(cat => allExercises.some(e => e.category === cat));
  return cats.map(cat => {
    const count = allExercises.filter(e => e.category === cat).length;
    const isOpen = _planBuilder.expandedCategory === cat;
    let html = `<button class="pb-group-btn${isOpen?' active':''}" onclick="pbToggleCategory('${cat}')"><span>${esc(cat)}</span><span class="pb-count">${count}</span></button>`;
    if (isOpen) {
      const exs = allExercises.filter(e => e.category === cat);
      html += '<div class="pb-ex-list">' + exs.map(e => pbExItemHTML(e)).join('') + '</div>';
    }
    return html;
  }).join('');
}

function pbExItemHTML(e) {
  return `<div class="pb-ex-item" onclick="pbAddExercise('${e.id}')">
    <div class="pb-ex-names"><div class="pb-ex-name">${esc(e.name)}</div>${e.nameEn?`<div class="pb-ex-name-en">${esc(e.nameEn)}</div>`:''}</div>
    <div class="pb-ex-actions">
      ${e.videoUrl?`<a href="${esc(e.videoUrl)}" target="_blank" class="pb-video-icon" onclick="event.stopPropagation()">▶</a>`:''}
      <button class="pb-ex-add" onclick="event.stopPropagation();pbAddExercise('${e.id}')">+</button>
    </div>
  </div>`;
}

function pbToggleCategory(cat) {
  _planBuilder.expandedCategory = _planBuilder.expandedCategory === cat ? '' : cat;
  document.getElementById('pb-browser').innerHTML = renderExerciseBrowser();
}
function pbSearchExercises(term) {
  _planBuilder.searchTerm = term;
  document.getElementById('pb-browser').innerHTML = renderExerciseBrowser();
}

function renderWorkoutTabs() {
  const tabs = _planBuilder.workouts.map((w, i) =>
    `<button class="pb-workout-tab${i===_planBuilder.activeWorkoutIdx?' active':''}" onclick="pbSwitchWorkout(${i})">${esc(w.name)}${_planBuilder.workouts.length>1?` <span style="font-size:.7rem;cursor:pointer;margin-right:4px" onclick="event.stopPropagation();pbRemoveWorkout(${i})">✕</span>`:''}</button>`
  ).join('');
  return `<div class="pb-workout-tabs">${tabs}<button class="pb-workout-tab pb-workout-tab-add" onclick="pbAddWorkout()">+ הוסף אימון</button></div>`;
}

function renderWorkoutExercises() {
  const w = _planBuilder.workouts[_planBuilder.activeWorkoutIdx];
  if (!w) return '<div class="pb-empty">בחר אימון</div>';
  if (!w.exercises.length) return '<div class="pb-empty">לחץ על תרגיל מהמאגר כדי להוסיף</div>';
  return w.exercises.map((e, ei) => {
    const ex = migrateExercise(e);
    const wi = _planBuilder.activeWorkoutIdx;
    const setsHtml = ex.setsData.map((s, si) =>
      `<div class="ex-set-row">
        <span>סט ${si+1}</span>
        <input type="number" min="0" placeholder="חזרות" value="${s.targetReps||''}" oninput="_planBuilder.workouts[${wi}].exercises[${ei}].setsData[${si}].targetReps=this.value">
        <input type="number" min="0" step="0.5" placeholder="משקל" value="${s.weight||''}" oninput="_planBuilder.workouts[${wi}].exercises[${ei}].setsData[${si}].weight=this.value">
        <input class="ex-set-notes" placeholder="הערות" value="${esc(s.notes||'')}" oninput="_planBuilder.workouts[${wi}].exercises[${ei}].setsData[${si}].notes=this.value">
        <button type="button" class="ex-remove" onclick="pbRemoveSet(${wi},${ei},${si})" style="font-size:.85rem">✕</button>
      </div>`
    ).join('');
    return `<div class="pb-ex-card">
      <div class="pb-ex-card-header">
        <div>
          <span class="pb-ex-card-name">${ei+1}. ${ex.videoUrl?`<a href="${esc(ex.videoUrl)}" target="_blank">${esc(ex.name)}</a>`:esc(ex.name)}</span>
          <span class="badge badge-cat" style="margin-right:6px">${esc(ex.category||'—')}</span>
        </div>
        <div class="pb-ex-card-actions">
          ${ei>0?`<button onclick="pbMoveExercise(${wi},${ei},-1)">↑</button>`:''}
          ${ei<w.exercises.length-1?`<button onclick="pbMoveExercise(${wi},${ei},1)">↓</button>`:''}
          <button onclick="pbRemoveExercise(${wi},${ei})">✕</button>
        </div>
      </div>
      <div class="ex-sets-header"><span></span><span>חזרות</span><span>משקל</span><span>הערות</span><span></span></div>
      ${setsHtml}
      <button type="button" class="ex-add-set" onclick="pbAddSet(${wi},${ei})">+ הוסף סט</button>
    </div>`;
  }).join('');
}

function pbAddExercise(exId) {
  const ex = load('exercises').find(e=>e.id===exId);
  if (!ex) return;
  const w = _planBuilder.workouts[_planBuilder.activeWorkoutIdx];
  w.exercises.push({ name:ex.name, nameEn:ex.nameEn||'', category:ex.category||'', videoUrl:ex.videoUrl||'', setsData:[{targetReps:10,weight:'',notes:''},{targetReps:10,weight:'',notes:''},{targetReps:10,weight:'',notes:''}] });
  document.getElementById('pb-workout-content').innerHTML = renderWorkoutExercises();
  showToast(`${ex.name} נוסף ✓`);
}
function pbRemoveExercise(wi, ei) {
  _planBuilder.workouts[wi].exercises.splice(ei, 1);
  document.getElementById('pb-workout-content').innerHTML = renderWorkoutExercises();
}
function pbMoveExercise(wi, ei, dir) {
  const arr = _planBuilder.workouts[wi].exercises;
  const ni = ei + dir;
  if (ni < 0 || ni >= arr.length) return;
  [arr[ei], arr[ni]] = [arr[ni], arr[ei]];
  document.getElementById('pb-workout-content').innerHTML = renderWorkoutExercises();
}
function pbAddSet(wi, ei) {
  _planBuilder.workouts[wi].exercises[ei].setsData.push({targetReps:'', weight:'', notes:''});
  document.getElementById('pb-workout-content').innerHTML = renderWorkoutExercises();
}
function pbRemoveSet(wi, ei, si) {
  const sd = _planBuilder.workouts[wi].exercises[ei].setsData;
  sd.splice(si, 1);
  if (!sd.length) sd.push({targetReps:'', weight:'', notes:''});
  document.getElementById('pb-workout-content').innerHTML = renderWorkoutExercises();
}
function pbSwitchWorkout(idx) {
  _planBuilder.activeWorkoutIdx = idx;
  const tabsContainer = document.querySelector('.pb-workout-tabs');
  if (tabsContainer) tabsContainer.outerHTML = renderWorkoutTabs();
  document.getElementById('pb-workout-content').innerHTML = renderWorkoutExercises();
}
function pbAddWorkout() {
  const letters = 'ABCDEFGHIJ';
  const nextName = 'אימון ' + (letters[_planBuilder.workouts.length] || (_planBuilder.workouts.length+1));
  _planBuilder.workouts.push({name:nextName, exercises:[]});
  _planBuilder.activeWorkoutIdx = _planBuilder.workouts.length - 1;
  renderPlanBuilder();
}
function pbRemoveWorkout(idx) {
  if (_planBuilder.workouts.length <= 1) { showToast('צריך לפחות אימון אחד'); return; }
  if (!confirm(`למחוק את "${_planBuilder.workouts[idx].name}"?`)) return;
  _planBuilder.workouts.splice(idx, 1);
  if (_planBuilder.activeWorkoutIdx >= _planBuilder.workouts.length) _planBuilder.activeWorkoutIdx = _planBuilder.workouts.length - 1;
  renderPlanBuilder();
}

async function savePlanFromBuilder() {
  if (!_planBuilder.planName.trim()) { document.getElementById('pb-plan-name').focus(); showToast('יש להזין שם תוכנית'); return; }
  const data = {
    clientId: _planBuilder.isTemplate ? '' : _planBuilder.clientId,
    name: _planBuilder.planName.trim(),
    isTemplate: _planBuilder.isTemplate,
    workouts: _planBuilder.workouts.map(w => ({
      name: w.name,
      exercises: w.exercises.map(e => ({
        name: e.name, nameEn: e.nameEn||'', category: e.category||'', videoUrl: e.videoUrl||'',
        setsData: (e.setsData||[]).map(s => ({ targetReps:+s.targetReps||0, weight:s.weight||'', notes:s.notes||'' }))
      }))
    }))
  };
  try {
    if (_planBuilder.editingId) {
      const plan = load('plans').find(x=>x.id===_planBuilder.editingId);
      Object.assign(plan, data);
      delete plan.exercises; // remove legacy field
      await saveItem('plans', plan);
    } else {
      await saveItem('plans', {id:uid(), ...data});
    }
    showToast('התוכנית נשמרה ✓');
    closePlanBuilder();
  } catch(err) { showToast('שגיאה בשמירה.'); }
}

async function deletePlan(id) {
  if (!confirm('למחוק תוכנית זו?')) return;
  await deleteItem('plans', id); renderWorkouts();
}
function openAssignTemplate(templateId) {
  const tmpl = load('plans').find(x=>x.id===templateId);
  if (!load('clients').length) { alert('יש להוסיף לקוח.'); return; }
  openModal('הקצה תבנית ללקוח', `<form id="modal-form">
    <p style="color:var(--muted);margin-bottom:16px;font-size:.9rem">עותק של "<strong>${esc(tmpl.name)}</strong>"</p>
    <div class="form-group"><label>בחר לקוח *</label><select name="clientId" required><option value="">— בחר —</option>${clientOptions()}</select></div>
    <div class="form-group"><label>שם התוכנית</label><input name="planName" value="${esc(tmpl.name)}" required></div>
    <div class="form-actions"><button type="button" class="btn btn-ghost" onclick="closeModal()">ביטול</button><button type="submit" class="btn">צור</button></div>
  </form>`, async fd => {
    await saveItem('plans', {id:uid(), clientId:fd.get('clientId'), name:fd.get('planName'), isTemplate:false, workouts:JSON.parse(JSON.stringify(getPlanWorkouts(tmpl)))});
    renderWorkouts(); showToast('התוכנית הוקצתה ✓');
  });
}

function exportPlanPDF(plan) {
  if (!plan) return;
  const client = plan.clientId ? load('clients').find(c=>c.id===plan.clientId) : null;
  const today  = new Date().toLocaleDateString('he-IL',{year:'numeric',month:'long',day:'numeric'});
  const workouts = getPlanWorkouts(plan);
  const totalEx = workouts.reduce((s,w)=>s+w.exercises.length,0);

  const workoutSections = workouts.map((w, wi) => {
    const exercises = w.exercises.map(migrateExercise);
    let rowNum = 0;
    const rows = exercises.map(e => {
      return e.setsData.map((s, si) => {
        rowNum++;
        const isFirst = si === 0;
        const rowspan = isFirst ? ` rowspan="${e.setsData.length}"` : '';
        const catCell = isFirst ? `<td${rowspan} style="text-align:center;vertical-align:middle">${esc(e.category||'—')}</td>` : '';
        const nameLink = e.videoUrl ? `<a href="${esc(e.videoUrl)}" target="_blank" style="color:#c0392b;text-decoration:underline">${esc(e.name)}</a>` : `${esc(e.name)}`;
        const nameCell = isFirst ? `<td${rowspan} style="vertical-align:middle"><strong>${nameLink}</strong></td>` : '';
        return `<tr style="${rowNum%2===0?'background:#fdf2f2':''}">
          ${catCell}${nameCell}
          <td style="text-align:center">סט ${si+1}</td>
          <td style="text-align:center">${s.targetReps||'—'}</td>
          <td style="text-align:center"></td>
          <td style="text-align:center">${s.weight||'—'}</td>
          <td>${esc(s.notes||'')}</td>
        </tr>`;
      }).join('');
    }).join('');
    return `${workouts.length>1?`<h2 style="color:#c0392b;font-size:18px;margin:24px 0 8px;${wi>0?'page-break-before:auto':''}">${esc(w.name)}</h2>`:''}
      <table><thead><tr><th>קטגוריה</th><th>תרגיל</th><th>סט</th><th>מטרת חזרות</th><th>חזרות שהצלחתי</th><th>משקל</th><th>הערות</th></tr></thead><tbody>${rows}</tbody></table>`;
  }).join('');

  const html = `<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="utf-8">
<title>תוכנית אימון — ${esc(plan.name)}</title>
<style>
  @media print { @page { margin: 15mm; } body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
  body{font-family:Arial,sans-serif;direction:rtl;text-align:right;margin:40px;color:#222;background:#fff}
  h1{color:#c0392b;font-size:22px;border-bottom:3px solid #c0392b;padding-bottom:8px;margin-bottom:6px}
  h2{color:#c0392b;font-size:18px}
  .meta{color:#555;font-size:13px;margin-bottom:24px;line-height:2}
  table{border-collapse:collapse;width:100%;font-size:13px;margin-bottom:16px}
  th{background:#c0392b;color:#fff;padding:10px 12px;border:1px solid #a93226}
  td{padding:8px 12px;border:1px solid #ddd}
  a{color:#c0392b}
  .footer{margin-top:28px;font-size:11px;color:#aaa;border-top:1px solid #eee;padding-top:10px;text-align:center}
  .no-print{margin-bottom:20px}
  @media print{.no-print{display:none}}
</style></head>
<body>
  <div class="no-print"><button onclick="window.print()" style="padding:10px 24px;font-size:14px;cursor:pointer;background:#c0392b;color:#fff;border:none;border-radius:8px">📄 שמור כ-PDF / הדפס</button></div>
  <h1>💪 תוכנית אימון: ${esc(plan.name)}</h1>
  <div class="meta">
    ${client?`<strong>מתאמן/ת:</strong> ${esc(client.name)}<br>`:'<strong>תבנית גנרית</strong><br>'}
    <strong>תאריך:</strong> ${today}<br>
    <strong>מספר תרגילים:</strong> ${totalEx}${workouts.length>1?` · <strong>אימונים:</strong> ${workouts.length}`:''}
  </div>
  ${workoutSections}
  <div class="footer">נוצר על ידי מערכת מאמן כושר</div>
  <script>window.onload=function(){window.print();}<\/script>
</body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
}

function sendPlanToWhatsApp(planId) {
  const plan = load('plans').find(p=>p.id===planId);
  if (!plan) return;
  exportPlanPDF(plan);
  if (plan.clientId) {
    const client = load('clients').find(c=>c.id===plan.clientId);
    if (client?.phone) {
      const intl = client.phone.replace(/\D/g,'').replace(/^0/,'972');
      const text = `שלום ${client.name}! שלחתי לך את תוכנית האימון שלך 💪\nשמור את הקובץ כ-PDF ושלח אותו כאן.`;
      setTimeout(()=>window.open(`https://wa.me/${intl}?text=${encodeURIComponent(text)}`, '_blank'), 600);
    }
  }
  showToast('התוכנית נפתחה — שמור כ-PDF ושלח בוואטסאפ 📎');
}

function renderPayments() {
  const payments = load('payments');
  const month = new Date().toISOString().slice(0,7);
  const paid    = payments.filter(p=>p.date.startsWith(month)&&p.status==='paid').reduce((s,p)=>s+(+p.amount||0),0);
  const pending = payments.filter(p=>p.status==='pending').reduce((s,p)=>s+(+p.amount||0),0);
  document.getElementById('pay-summary').innerHTML=`
    <div class="card"><div class="card-title">שולם החודש</div><div class="card-value" style="color:#4caf50">₪${paid.toLocaleString()}</div></div>
    <div class="card"><div class="card-title">ממתין לתשלום</div><div class="card-value" style="color:#ffa726">₪${pending.toLocaleString()}</div></div>`;
  renderPayFilters();
  let filtered;
  const heading = document.getElementById('payments-heading');
  if (payFilter.active) {
    filtered = payments.filter(p => {
      if (payFilter.month && !p.date.startsWith(payFilter.month)) return false;
      if (payFilter.fromDate && p.date < payFilter.fromDate) return false;
      if (payFilter.toDate && p.date > payFilter.toDate) return false;
      if (payFilter.clientId && p.clientId !== payFilter.clientId) return false;
      return true;
    });
    heading.textContent = 'תשלומים — תוצאות סינון';
  } else {
    filtered = payments.filter(p => p.status === 'pending');
    heading.textContent = 'תשלומים — ממתינים';
  }
  if (!filtered.length) { document.getElementById('payments-table').innerHTML='<div class="empty">אין תשלומים להצגה.</div>'; return; }
  document.getElementById('payments-table').innerHTML=`<table>
    <thead><tr><th>לקוח</th><th>סכום</th><th>תאריך</th><th>חבילה</th><th>סטטוס</th><th>פעולות</th></tr></thead>
    <tbody>${[...filtered].sort((a,b)=>a.date<b.date?1:-1).map(p=>`<tr>
      <td>${esc(clientName(p.clientId))}</td><td>₪${(+p.amount||0).toLocaleString()}</td>
      <td>${fmtDate(p.date)}</td><td>${esc(p.package)}</td>
      <td><button class="badge ${p.status==='paid'?'badge-paid':'badge-pending'}" onclick="togglePayment('${p.id}')" style="cursor:pointer;border:none">${p.status==='paid'?'שולם':'ממתין'}</button></td>
      <td class="actions">
        <button class="btn btn-teal btn-sm" onclick="openIssueDocument('${p.id}')">🧾 הנפק</button>
        <button class="btn btn-ghost btn-sm" onclick="openEditPayment('${p.id}')">עריכה</button>
        <button class="btn btn-danger btn-sm" onclick="deletePayment('${p.id}')">מחק</button>
      </td></tr>`).join('')}</tbody></table>`;
}
function renderPayFilters() {
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const year = new Date().getFullYear();
  document.getElementById('pay-filters-container').innerHTML = `
    <div class="pay-filters">
      <div class="pay-filters-title">חיפוש וסינון תשלומים</div>
      <div class="month-btns">
        ${months.map((m, i) => {
          const val = year + '-' + String(i+1).padStart(2,'0');
          return `<button class="month-btn${payFilter.month===val?' active':''}" onclick="applyPayMonthFilter('${val}')">${m}</button>`;
        }).join('')}
      </div>
      <div class="pay-filter-row">
        <div class="form-group"><label>מתאריך</label><input type="date" id="pay-from" value="${payFilter.fromDate}" onchange="applyPayDateFilter()"></div>
        <div class="form-group"><label>עד תאריך</label><input type="date" id="pay-to" value="${payFilter.toDate}" onchange="applyPayDateFilter()"></div>
        <div class="form-group"><label>לקוח</label><select id="pay-client-filter" onchange="applyPayClientFilter()"><option value="">כל הלקוחות</option>${clientOptions(payFilter.clientId)}</select></div>
        <button class="btn btn-ghost btn-sm" onclick="clearPayFilters()" style="margin-bottom:0;align-self:flex-end;padding:9px 16px">נקה סינון</button>
      </div>
    </div>`;
}
function applyPayMonthFilter(monthVal) {
  if (payFilter.month === monthVal) { payFilter.month = null; } else { payFilter.month = monthVal; payFilter.fromDate = ''; payFilter.toDate = ''; }
  payFilter.active = !!(payFilter.month || payFilter.fromDate || payFilter.toDate || payFilter.clientId);
  renderPayments();
}
function applyPayDateFilter() {
  payFilter.fromDate = document.getElementById('pay-from').value;
  payFilter.toDate = document.getElementById('pay-to').value;
  if (payFilter.fromDate || payFilter.toDate) payFilter.month = null;
  payFilter.active = !!(payFilter.month || payFilter.fromDate || payFilter.toDate || payFilter.clientId);
  renderPayments();
}
function applyPayClientFilter() {
  payFilter.clientId = document.getElementById('pay-client-filter').value;
  payFilter.active = !!(payFilter.month || payFilter.fromDate || payFilter.toDate || payFilter.clientId);
  renderPayments();
}
function clearPayFilters() {
  payFilter = { active: false, month: null, fromDate: '', toDate: '', clientId: '' };
  renderPayments();
}

function openEditPayment(id) {

    Object.assign(p, {clientId:fd.get('clientId'), amount:fd.get('amount'), date:fd.get('date'), status:fd.get('status'), package:fd.get('package')});

  const p = load('payments').find(x=>x.id===id);
  const wasPending = p.status === 'pending';

  await saveItem('payments', p); renderPayments();

async function deletePayment(id) {
  if (!confirm('למחוק תשלום זה?')) return;

}

// ===== REMINDERS ========
// ========================
function renderReminders() {
  const sessions = load('sessions'), clients = load('clients');
  const today = new Date(); today.setHours(0,0,0,0);
  const limit = new Date(today); limit.setDate(limit.getDate()+7);
  const upcoming = sessions
    .filter(s=>{ const d=new Date(s.date+'T00:00'); return d>=today&&d<=limit; })
    .sort((a,b)=>(a.date+(a.time||a.startTime||''))<(b.date+(b.time||b.startTime||''))?-1:1);
  const container = document.getElementById('reminders-list');
  if (!upcoming.length) { container.innerHTML='<div class="empty">אין אימונים ב-7 הימים הקרובים.</div>'; return; }
  const todayStr = new Date().toISOString().slice(0,10);
  container.innerHTML = upcoming.map(s => {
    const isShift = s.type === 'shift';
    const client = clients.find(c=>c.id===s.clientId)||{};
    const isToday = s.date===todayStr;
    if (isShift) {
      const hrs = calcShiftHours(s.startTime, s.endTime);
      return `<div class="reminder-card${isToday?' today-card':''}">
        <div class="reminder-info">
          <h3>${isToday?'<span class="reminder-tag">היום</span>':''}<span class="badge badge-shift">משמרת</span></h3>
          <p>${fmtDateLong(s.date)} · ${esc(s.startTime||'')}–${esc(s.endTime||'')} · ${hrs.toFixed(1)} שעות</p>
          ${s.notes?`<p style="margin-top:4px">${esc(s.notes)}</p>`:''}
        </div>
      </div>`;
    }
    const intl = (client.phone||'').replace(/\D/g,'').replace(/^0/,'972');
    const text = `שלום ${client.name||''}! רוצה להזכיר לך שיש לנו אימון ב${fmtDateLong(s.date)} בשעה ${s.time}. מחכה לך! 💪`;
    const waURL = `https://wa.me/${intl}?text=${encodeURIComponent(text)}`;
    return `<div class="reminder-card${isToday?' today-card':''}">
      <div class="reminder-info">
        <h3>${isToday?'<span class="reminder-tag">היום</span>':''}${esc(client.name||'לקוח לא ידוע')}</h3>
        <p>${fmtDateLong(s.date)} · ${esc(s.time)} · ${esc(s.duration)} דקות</p>
        ${s.notes?`<p style="margin-top:4px">${esc(s.notes)}</p>`:''}
      </div>
      <a href="${waURL}" target="_blank" class="btn wa-btn btn-sm">📲 שלח תזכורת</a>
    </div>`;
  }).join('');
}

const MORNING_CONFIG = {
  apiKey:    'YOUR_API_KEY',
  apiSecret: 'YOUR_API_SECRET',
  baseUrl:   'https://api.greeninvoice.co.il/api/v1'
};

let _morningToken = null;
let _morningTokenExp = 0;

async function morningGetToken() {
  if (_morningToken && Date.now() < _morningTokenExp) return _morningToken;
  const res = await fetch(MORNING_CONFIG.baseUrl + '/account/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: MORNING_CONFIG.apiKey, secret: MORNING_CONFIG.apiSecret })
  });
  if (!res.ok) throw new Error('Morning auth failed: ' + res.status);
  const data = await res.json();
  _morningToken = data.token;
  _morningTokenExp = Date.now() + 55 * 60 * 1000;
  return _morningToken;
}

async function morningCreateDocument(docData) {
  const token = await morningGetToken();
  const res = await fetch(MORNING_CONFIG.baseUrl + '/documents', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify(docData)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.errorMessage || 'Morning API error: ' + res.status);
  }
  return await res.json();
}

      </div>

    <div id="invoice-fields">

        <div class="form-group"><label>כמות</label><input name="quantity" type="number" min="1" value="1"></div>
        <div class="form-group"><label>מחיר ליחידה (₪) *</label><input name="price" type="number" step="0.01" value="${esc(payment.amount || '')}" required></div>
      </div>
      <div class="form-group"><label>מע"מ</label><select name="vatType"><option value="2" selected>פטור ממע"מ (עוסק פטור)</option></select></div>

    const docType = +fd.get('docType');

    const docData = {

      type: docType, date: fd.get('docDate'), dueDate: fd.get('dueDate'),

      income: [{ catalogNum: '', description: fd.get('description') || 'תשלום', quantity, price, currency: 'ILS', vatType: +fd.get('vatType') }],
      payment: [{ type: +fd.get('payMethod'), date: fd.get('payDate'), price: price * quantity, currency: 'ILS' }],

    };
    try {

      payment.morningDocId = result.id || result._id || '';
      payment.morningDocType = docType;

}

const PASS_HASH = '0792bc68c9eb63682cd44053750bd1c8f0d07e2ab32738803b291ee58b3293e3';

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function handleLogin(e) {
  e.preventDefault();
  const pw = document.getElementById('login-password').value;
  const hash = await sha256(pw);
  if (hash === PASS_HASH) {
    localStorage.setItem('ft_auth', 'yes');
    document.getElementById('login-screen').style.display = 'none';
    init();
  } else {
    document.getElementById('login-error').textContent = 'סיסמה שגויה';
    document.getElementById('login-password').value = '';
    document.getElementById('login-password').focus();
  }
}

function handleLogout() {
  localStorage.removeItem('ft_auth');
  location.reload();
}
