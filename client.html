<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>האימונים שלי</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #1a1a2e;
      --card:    #16213e;
      --border:  #0f3460;
      --accent:  #e94560;
      --accent2: #a8dadc;
      --text:    #e0e0e0;
      --muted:   #888;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOADING */
    #loading-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .loading-box { text-align: center; color: var(--accent2); }
    .spinner {
      width: 44px; height: 44px; border: 4px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-box p { font-size: 1rem; }
    .loading-box small { color: var(--muted); font-size: .82rem; margin-top: 6px; display: block; }

    /* NAV */
    nav {
      background: var(--card); border-bottom: 2px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 60px; position: sticky; top: 0; z-index: 100; gap: 12px;
    }
    .app-title { color: var(--accent); font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 15px rgba(233,69,96,.5); white-space: nowrap; }
    .nav-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .nav-tab {
      background: none; border: 2px solid transparent; color: var(--muted);
      padding: 7px 13px; border-radius: 8px; cursor: pointer; font-size: .85rem; transition: all .2s;
    }
    .nav-tab:hover { color: var(--text); border-color: var(--border); }
    .nav-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(233,69,96,.1); }

    /* MAIN */
    main { padding: 24px; max-width: 900px; margin: 0 auto; }
    section[id^="tab-"] { display: none; }
    section[id^="tab-"].active { display: block; }

    /* CARDS */
    .card { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 18px; }
    .card-title { color: var(--accent2); font-size: 1rem; margin-bottom: 6px; }

    /* SECTION HEADER */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .section-header h2 { font-size: 1.2rem; color: var(--accent2); }

    /* BUTTONS */
    .btn {
      background: var(--accent); color: #fff; border: none; padding: 8px 20px;
      border-radius: 8px; cursor: pointer; font-size: .9rem;
      transition: background .2s, transform .1s; text-decoration: none; display: inline-block;
    }
    .btn:hover { background: #c73652; transform: scale(1.03); }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-sm { padding: 4px 12px; font-size: .8rem; }
    .btn-ghost { background: none; border: 2px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: none; transform: scale(1.03); }

    /* BADGES */
    .badge { padding: 3px 10px; border-radius: 10px; font-size: .75rem; font-weight: 600; display: inline-block; }
    .badge-cat { background: rgba(168,218,220,.15); color: var(--accent2); }
    .badge-trainer { background: rgba(233,69,96,.15); color: var(--accent); }
    .badge-self { background: rgba(168,218,220,.15); color: var(--accent2); }
    .badge-logged { background: rgba(92,75,158,.2); color: #b39ddb; }

    /* EMPTY */
    .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 1rem; }

    /* FORM */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group label { font-size: .85rem; color: var(--muted); }
    .form-group input, .form-group select, .form-group textarea { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: .9rem; font-family: inherit; width: 100%; transition: border-color .2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent2); }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }

    /* MODAL */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
    #modal-overlay.open { display: flex; }
    #modal-box { background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; }
    #modal-title { color: var(--accent2); font-size: 1.2rem; margin-bottom: 20px; }
    #modal-close { position: absolute; top: 16px; left: 16px; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; line-height: 1; }
    #modal-close:hover { color: var(--accent); }

    /* LOGIN */
    #login-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .login-box {
      background: var(--card); border: 2px solid var(--border); border-radius: 16px;
      padding: 40px 32px; width: 100%; max-width: 360px; text-align: center;
    }
    .login-box h1 { color: var(--accent); font-size: 1.6rem; margin-bottom: 8px; }
    .login-box p { color: var(--muted); font-size: .9rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%; background: var(--bg); border: 2px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 12px 14px; font-size: 1rem; font-family: inherit;
      text-align: center; margin-bottom: 16px; transition: border-color .2s;
    }
    .login-box input:focus { outline: none; border-color: var(--accent2); }
    .login-error { color: var(--accent); font-size: .85rem; margin-bottom: 12px; min-height: 1.2em; }
    .logout-btn {
      background: none; border: 2px solid var(--border); color: var(--muted);
      padding: 5px 14px; border-radius: 8px; cursor: pointer; font-size: .8rem; transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* TOAST */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card); border: 2px solid var(--accent2); color: var(--text); padding: 12px 24px; border-radius: 12px; z-index: 500; opacity: 0; transition: all .3s; font-size: .95rem; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* MY WORKOUTS */
    .workout-card {
      background: var(--card); border: 2px solid var(--border); border-radius: 12px;
      padding: 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .2s;
    }
    .workout-card:hover { border-color: var(--accent2); }
    .workout-card.expanded { border-color: var(--accent); }
    .workout-card-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .workout-card-date { font-size: .95rem; font-weight: 600; color: var(--text); }
    .workout-card-info { font-size: .82rem; color: var(--muted); margin-top: 4px; }
    .workout-card-detail {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
    }
    .wcd-exercise { margin-bottom: 10px; }
    .wcd-ex-name { color: var(--accent2); font-weight: 600; font-size: .88rem; margin-bottom: 4px; }
    .wcd-ex-name a { color: var(--accent2); text-decoration: none; }
    .wcd-ex-name a:hover { text-decoration: underline; }
    .wcd-sets { display: flex; flex-wrap: wrap; gap: 6px; }
    .wcd-set { background: var(--bg); padding: 3px 10px; border-radius: 6px; font-size: .78rem; color: var(--muted); }

    /* NEW WORKOUT - PICKER */
    .plan-picker { display: flex; flex-direction: column; gap: 16px; }
    .plan-pick-card { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 18px; }
    .plan-pick-name { font-size: 1.05rem; font-weight: 700; color: var(--accent2); margin-bottom: 12px; }
    .workout-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .workout-btn {
      background: var(--bg); border: 2px solid var(--border); color: var(--text);
      padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: .95rem;
      transition: all .2s; min-width: 100px; text-align: center;
    }
    .workout-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,.08); }

    /* LIVE WORKOUT */
    .live-workout { padding: 0 4px; }
    .live-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; margin-bottom: 12px; border-bottom: 2px solid var(--border); position: sticky; top: 56px; background: var(--bg); z-index: 10; }
    .live-progress { color: var(--accent2); font-size: .9rem; font-weight: 600; }
    .live-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .live-ex-name { font-size: 1.15rem; font-weight: 700; color: var(--accent2); margin-bottom: 4px; }
    .live-ex-name a { color: var(--accent2); text-decoration: none; }
    .live-ex-name a:hover { text-decoration: underline; }
    .live-prev { background: rgba(168,218,220,.08); border: 1px solid rgba(168,218,220,.2); border-radius: 10px; padding: 10px 14px; margin: 12px 0; font-size: .82rem; color: var(--muted); }
    .live-prev-title { color: var(--accent2); font-weight: 600; margin-bottom: 4px; font-size: .78rem; }
    .live-prev-sets { display: flex; flex-wrap: wrap; gap: 8px; }
    .live-prev-set { background: var(--bg); padding: 3px 8px; border-radius: 6px; font-size: .78rem; }
    .live-set-row { display: grid; grid-template-columns: 36px 1fr 1fr 1.2fr auto; gap: 8px; align-items: center; margin-bottom: 6px; }
    .live-set-row span { font-size: .82rem; color: var(--muted); text-align: center; }
    .live-set-row input { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; font-size: 16px; font-family: inherit; width: 100%; min-height: 44px; }
    .live-set-row input:focus { outline: none; border-color: var(--accent2); }
    .live-sets-header { display: grid; grid-template-columns: 36px 1fr 1fr 1.2fr auto; gap: 8px; margin-bottom: 6px; }
    .live-sets-header span { font-size: .72rem; color: var(--muted); text-align: center; }
    .live-nav { display: flex; gap: 12px; margin-top: 16px; }
    .live-nav button { flex: 1; padding: 14px; font-size: 1rem; min-height: 48px; }
    .live-swap-btn { background: none; border: 2px dashed var(--border); color: var(--muted); padding: 10px; border-radius: 10px; cursor: pointer; font-size: .85rem; width: 100%; margin-top: 12px; transition: all .2s; text-align: center; }
    .live-swap-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .live-swap-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; justify-content: center; align-items: flex-start; padding-top: 60px; }
    .live-swap-panel { background: var(--card); border: 2px solid var(--border); border-radius: 14px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    .live-swap-panel-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 2px solid var(--border); }
    .ex-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; }
    .ex-remove:hover { color: var(--accent); background: rgba(233,69,96,.1); }
    .ex-add-set { background: none; border: 1px dashed var(--border); color: var(--muted); padding: 4px; border-radius: 6px; cursor: pointer; font-size: .78rem; width: 100%; margin-top: 4px; }
    .ex-add-set:hover { border-color: var(--accent2); color: var(--accent2); }

    /* SWAP BROWSER */
    .pb-group-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; text-align: right; padding: 10px 16px; background: none; border: none; border-bottom: 1px solid rgba(15,52,96,.4); color: var(--text); font-size: .88rem; cursor: pointer; transition: background .2s; }
    .pb-group-btn:hover { background: rgba(233,69,96,.08); }
    .pb-group-btn.active { background: rgba(233,69,96,.12); color: var(--accent); font-weight: 600; }
    .pb-group-btn .pb-count { color: var(--muted); font-size: .75rem; }
    .pb-ex-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px 8px 12px; padding-right: 28px; border-bottom: 1px solid rgba(15,52,96,.3); cursor: pointer; transition: background .2s; font-size: .84rem; }
    .pb-ex-item:hover { background: rgba(168,218,220,.08); }
    .pb-ex-names { flex: 1; }
    .pb-ex-name { color: var(--accent2); }
    .pb-ex-name-en { color: var(--muted); font-size: .75rem; }
    .pb-ex-actions { display: flex; align-items: center; gap: 6px; }
    .pb-ex-add { color: var(--accent); font-size: 1.2rem; opacity: 0; transition: opacity .2s; background: none; border: none; cursor: pointer; padding: 2px 6px; }
    .pb-ex-item:hover .pb-ex-add { opacity: 1; }
    .pb-empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: .9rem; }

    /* TRACKING */
    .tr-date-pills { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px; margin-bottom: 16px; -webkit-overflow-scrolling: touch; }
    .tr-date-pills::-webkit-scrollbar { height: 4px; }
    .tr-date-pills::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .tr-date-pill { background: var(--bg); border: 2px solid var(--border); border-radius: 10px; padding: 8px 16px; cursor: pointer; white-space: nowrap; font-size: .82rem; transition: all .2s; flex-shrink: 0; text-align: center; color: var(--text); }
    .tr-date-pill:hover { border-color: var(--accent); color: var(--accent); }
    .tr-date-pill.active { border-color: var(--accent); background: rgba(233,69,96,.1); color: var(--accent); font-weight: 600; }
    .tr-date-pill .tr-pill-date { font-weight: 600; }
    .tr-date-pill .tr-pill-name { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .tr-date-pill.active .tr-pill-name { color: var(--accent); opacity: .7; }
    .tr-session-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .tr-session-title { font-size: 1.1rem; font-weight: 700; color: var(--accent2); }
    .tr-session-meta { font-size: .82rem; color: var(--muted); }
    .tr-ex-row { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .tr-ex-name { font-size: .95rem; font-weight: 700; color: var(--accent2); margin-bottom: 8px; cursor: pointer; }
    .tr-ex-name:hover { text-decoration: underline; }
    .tr-ex-name a { color: var(--accent2); text-decoration: none; }
    .tr-ex-name a:hover { text-decoration: underline; }
    .tr-ex-sets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
    .tr-ex-set { background: var(--bg); padding: 5px 12px; border-radius: 8px; font-size: .82rem; }
    .tr-ex-prev { font-size: .78rem; color: var(--muted); margin-top: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tr-delta { font-size: .78rem; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
    .tr-delta-up { background: rgba(76,175,80,.15); color: #4caf50; }
    .tr-delta-down { background: rgba(233,69,96,.15); color: var(--accent); }
    .tr-delta-same { background: rgba(136,136,136,.15); color: var(--muted); }
    .tr-chart { width: 100%; height: 120px; position: relative; margin-top: 8px; }
    .tr-chart svg { width: 100%; height: 100%; }
    .tr-legend { display: flex; gap: 16px; justify-content: center; font-size: .72rem; color: var(--muted); margin-top: 4px; }
    .tr-chart-card { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 16px; margin-top: 16px; }
    .tr-chart-title { font-size: .9rem; font-weight: 600; color: var(--accent2); margin-bottom: 8px; }

    /* CALENDAR */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-nav h3 { color: var(--accent2); font-size: 1.1rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 24px; }
    .cal-day-name { text-align: center; font-size: .75rem; color: var(--muted); padding: 4px 0; }
    .cal-day { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 4px; min-height: 52px; text-align: center; cursor: pointer; transition: border-color .2s; }
    .cal-day:hover { border-color: var(--accent); }
    .cal-day.today { border-color: var(--accent2); }
    .cal-day.empty-day { background: none; border-color: transparent; cursor: default; }
    .cal-day-num { font-size: .85rem; color: var(--muted); }
    .cal-day.today .cal-day-num { color: var(--accent2); font-weight: bold; }
    .cal-day.selected { border-color: var(--accent); background: rgba(233,69,96,.1); }
    .cal-day.selected .cal-day-num { color: var(--accent); font-weight: bold; }
    .cal-dots { display: flex; gap: 3px; justify-content: center; margin-top: 4px; flex-wrap: wrap; }
    .cal-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .cal-dot.self-dot { background: var(--accent2); }
    .cal-view-toggle { display: flex; gap: 0; border: 2px solid var(--border); border-radius: 8px; overflow: hidden; }
    .cal-view-btn { background: none; border: none; color: var(--muted); padding: 5px 14px; cursor: pointer; font-size: .8rem; font-family: inherit; transition: all .2s; }
    .cal-view-btn.active { background: var(--accent); color: #fff; }
    .week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
    .week-col { background: var(--card); border: 2px solid var(--border); border-radius: 10px; padding: 8px 6px; min-height: 120px; cursor: pointer; transition: border-color .2s; }
    .week-col:hover { border-color: var(--accent); }
    .week-col.selected { border-color: var(--accent); background: rgba(233,69,96,.1); }
    .week-col.today { border-color: var(--accent2); }
    .week-col-header { text-align: center; margin-bottom: 6px; }
    .week-col-day { font-size: .75rem; color: var(--muted); }
    .week-col-num { font-size: 1rem; font-weight: 600; color: var(--text); }
    .week-col.today .week-col-num { color: var(--accent2); }
    .week-col.selected .week-col-num { color: var(--accent); }
    .week-session { font-size: .72rem; padding: 3px 4px; margin-bottom: 3px; border-radius: 4px; background: rgba(233,69,96,.1); color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .week-session.self { background: rgba(168,218,220,.1); color: var(--accent2); }
    .day-session-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .day-session-info { font-size: .9rem; }
    .day-session-info strong { color: var(--accent2); }
    .day-session-actions { display: flex; gap: 6px; }
    .source-radio { display: flex; gap: 12px; }
    .source-radio label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: .9rem; }

    @media (max-width: 640px) {
      nav { flex-direction: column; height: auto; padding: 12px; gap: 8px; }
      .nav-tabs { justify-content: center; }
      main { padding: 14px; }
      .live-set-row { grid-template-columns: 30px 1fr 1fr auto; }
      .live-set-row input:nth-child(4) { display: none; }
      .live-sets-header { grid-template-columns: 30px 1fr 1fr auto; }
      .live-sets-header span:nth-child(4) { display: none; }
      .week-grid { grid-template-columns: repeat(3,1fr); }
      .week-col { min-height: 80px; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h1>💪 האימונים שלי</h1>
    <p>הזן מספר טלפון וקוד כניסה</p>
    <form id="login-form" onsubmit="handleClientLogin(event)">
      <input type="tel" id="login-phone" placeholder="מספר טלפון" inputmode="numeric" pattern="[0-9]{9,15}" autocomplete="tel" autofocus>
      <input type="password" id="login-pin" placeholder="סיסמה (4 ספרות אחרונות)" maxlength="4" inputmode="numeric" autocomplete="current-password">
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="btn" style="width:100%">כניסה</button>
    </form>
  </div>
</div>

<!-- LOADING -->
<div id="loading-overlay" style="display:none">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>טוען את האימונים שלך...</p>
    <small>Firebase Firestore</small>
  </div>
</div>

<nav>
  <div class="app-title">💪 <span id="client-welcome">האימונים שלי</span></div>
  <button class="logout-btn" onclick="handleLogout()">התנתק</button>
  <div class="nav-tabs">
    <button class="nav-tab" data-tab="myworkouts">יומן אימונים</button>
    <button class="nav-tab" data-tab="newworkout">מעקב</button>
    <button class="nav-tab" data-tab="tracking">גרפים</button>
  </div>
</nav>

<main>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ===== FIREBASE INIT =====
const firebaseConfig = {
  apiKey: "AIzaSyBKqoqMqqpbaVYTJzTwHxiWGTY44uLFqyY",
  authDomain: "fitness-trainer-84b8c.firebaseapp.com",
  projectId: "fitness-trainer-84b8c",
  storageBucket: "fitness-trainer-84b8c.firebasestorage.app",
  messagingSenderId: "218384462790",
  appId: "1:218384462790:web:c2ae4960ca4888a97bb8c7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== IN-MEMORY CACHE =====
const cache = { clients:[], sessions:[], plans:[], exercises:[] };
function load(col) { return cache[col] || []; }

async function saveItem(col, item) {
  const idx = cache[col].findIndex(x => x.id === item.id);
  if (idx >= 0) cache[col][idx] = item;
  else cache[col].push(item);
  await db.collection(col).doc(item.id).set(item);
}

async function initDB() {
  const cols = Object.keys(cache);
  await Promise.all(cols.map(async col => {
    const snap = await db.collection(col).get();
    cache[col] = snap.docs.map(doc => ({ ...doc.data(), id: doc.id }));
  }));
}

// ===== CLIENT AUTH STATE =====
let _currentClientId = '';
let _currentClientName = '';

// ===== HELPERS =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { if (!d) return ''; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
function fmtDateLong(d) { if (!d) return ''; return new Date(d+'T00:00').toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function planName(id) { const p = load('plans').find(x=>x.id===id); return p ? p.name : ''; }

function migrateExercise(e) {
  if (e.setsData && e.setsData.length) return e;
  const numSets = +e.sets || 3;
  const reps = +e.reps || 10;
  return { name:e.name||'', category:e.category||'', videoUrl:e.videoUrl||'',
    setsData: Array.from({length:numSets}, ()=>({targetReps:reps, weight:'', notes:''})) };
}

function getPlanWorkouts(plan) {
  if (plan.workouts) return plan.workouts;
  return [{ name:'אימון A', exercises:(plan.exercises||[]).map(migrateExercise) }];
}

const EX_CATS = ['חזה עליון','חזה','יד אחורית','כתף צידית','גב (אנכי)','גב (אופקי)','גב (פולאובר)','יד קדמית','ארבע ראשי','האמסטרינג','תאומים','בטן','תחת','כתף אחורית','כתף קדמית','טרפזים','אמות','מקרבים'];

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ===== MODAL =====
let _onModalSubmit = null;
function openModal(title, bodyHTML, onSubmit) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-overlay').classList.add('open');
  _onModalSubmit = onSubmit;
  const form = document.getElementById('modal-form');
  if (form && onSubmit) form.addEventListener('submit', handleModalSubmit);
}
async function handleModalSubmit(e) {
  e.preventDefault();
  const btn = e.target.querySelector('[type=submit]');
  if (btn) { btn.disabled = true; btn.textContent = 'שומר...'; }
  try {
    if (_onModalSubmit) await _onModalSubmit(new FormData(e.target));
    closeModal();
  } catch(err) {
    console.error(err);
    showToast('שגיאה בשמירה');
    if (btn) { btn.disabled = false; btn.textContent = 'שמור'; }
  }
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-body').innerHTML = '';
  _onModalSubmit = null;
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ===== TAB NAVIGATION =====
const RENDERERS = { myworkouts:renderMyWorkouts, newworkout:renderNewWorkout, tracking:renderTracking };
function switchTab(name) {
  if (_liveWorkout.active) { closeLiveWorkout(); }
  document.querySelectorAll('section[id^="tab-"]').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  RENDERERS[name]();
}
document.querySelectorAll('.nav-tab').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));

// ===========================
// ===== AUTHENTICATION ======
// ===========================
async function handleClientLogin(e) {
  e.preventDefault();
  const phone = document.getElementById('login-phone').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');

  if (!phone || !pin) { errEl.textContent = 'הזן מספר טלפון וסיסמה'; return; }

  errEl.textContent = 'מתחבר...';
  try {
    const snap = await db.collection('clients').get();
    const clients = snap.docs.map(doc => ({ ...doc.data(), id: doc.id }));

    const normalizedPhone = phone.replace(/\D/g,'');
    const client = clients.find(c => {
      const cPhone = (c.phone||'').replace(/\D/g,'');
      return cPhone === normalizedPhone;
    });

    if (!client) { errEl.textContent = 'מספר טלפון לא נמצא'; document.getElementById('login-phone').focus(); return; }

    const expectedPin = normalizedPhone.slice(-4);
    if (pin !== expectedPin) { errEl.textContent = 'סיסמה שגויה'; document.getElementById('login-pin').value = ''; document.getElementById('login-pin').focus(); return; }

    localStorage.setItem('ft_client_auth', JSON.stringify({ clientId: client.id, phone: normalizedPhone }));
    _currentClientId = client.id;
    _currentClientName = client.name;
    document.getElementById('login-screen').style.display = 'none';
    init();
  } catch(err) {
    console.error(err);
    errEl.textContent = 'שגיאה בהתחברות — נסה שוב';
  }
}

function handleLogout() {
  localStorage.removeItem('ft_client_auth');
  location.reload();
}

// ===========================
// ===== MY WORKOUTS =========
// ===========================
let _expandedSession = '';
let _clientCalYear, _clientCalMonth;
let _clientCalSelectedDate = new Date().toISOString().slice(0,10);
let _clientCalView = 'month';
let _clientCalWeekStart = '';

function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function renderMyWorkouts() {
  const now = new Date();
  if (!_clientCalYear) { _clientCalYear = now.getFullYear(); _clientCalMonth = now.getMonth(); }
  if (!_clientCalWeekStart) {
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const dayOfWeek = today.getDay(); // 0=Sun
    today.setDate(today.getDate() - dayOfWeek);
    _clientCalWeekStart = today.toISOString().slice(0,10);
  }
  // Update view toggle buttons
  document.getElementById('client-cal-view-month')?.classList.toggle('active', _clientCalView==='month');
  document.getElementById('client-cal-view-week')?.classList.toggle('active', _clientCalView==='week');

  if (_clientCalView === 'month') {
    renderClientCalendarMonth();
  } else {
    renderClientCalendarWeek();
  }
  renderClientSessionsTable();
}

function renderClientCalendarMonth() {
  const container = document.getElementById('client-cal-container');
  const titleEl = document.getElementById('client-cal-title');
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  titleEl.textContent = months[_clientCalMonth] + ' ' + _clientCalYear;

  const sessions = load('sessions').filter(s => s.clientId === _currentClientId && s.type === 'training');
  const sessionsByDate = {};
  sessions.forEach(s => {
    if (!sessionsByDate[s.date]) sessionsByDate[s.date] = [];
    sessionsByDate[s.date].push(s);
  });

  const firstDay = new Date(_clientCalYear, _clientCalMonth, 1);
  const lastDay = new Date(_clientCalYear, _clientCalMonth + 1, 0);
  const startDay = firstDay.getDay(); // 0=Sun
  const totalDays = lastDay.getDate();
  const todayStr = new Date().toISOString().slice(0,10);

  const dayNames = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  let html = '<div class="cal-grid">';
  dayNames.forEach(d => { html += `<div class="cal-day-name">${d}</div>`; });

  for (let i = 0; i < startDay; i++) html += '<div class="cal-day empty-day"></div>';
  for (let d = 1; d <= totalDays; d++) {
    const dateStr = `${_clientCalYear}-${String(_clientCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === _clientCalSelectedDate;
    const daySessions = sessionsByDate[dateStr] || [];
    const dots = daySessions.map(s => {
      const isSelf = s.source === 'client';
      return `<div class="cal-dot${isSelf?' self-dot':''}"></div>`;
    }).join('');
    html += `<div class="cal-day${isToday?' today':''}${isSelected?' selected':''}" onclick="handleClientDayClick('${dateStr}')">
      <div class="cal-day-num">${d}</div>
      ${dots?`<div class="cal-dots">${dots}</div>`:''}
    </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderClientCalendarWeek() {
  const container = document.getElementById('client-cal-container');
  const titleEl = document.getElementById('client-cal-title');
  const sessions = load('sessions').filter(s => s.clientId === _currentClientId && s.type === 'training');
  const sessionsByDate = {};
  sessions.forEach(s => {
    if (!sessionsByDate[s.date]) sessionsByDate[s.date] = [];
    sessionsByDate[s.date].push(s);
  });

  const todayStr = new Date().toISOString().slice(0,10);
  const dayNames = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const startDate = _clientCalWeekStart;
  const endDate = addDays(startDate, 6);
  titleEl.textContent = fmtDate(startDate) + ' — ' + fmtDate(endDate);

  let html = '<div class="week-grid">';
  for (let i = 0; i < 7; i++) {
    const dateStr = addDays(startDate, i);
    const d = new Date(dateStr + 'T00:00');
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === _clientCalSelectedDate;
    const daySessions = sessionsByDate[dateStr] || [];
    const sessHtml = daySessions.map(s => {
      const wName = s.planId ? getWorkoutName(s.planId, s.workoutIdx) : '';
      const isSelf = s.source === 'client';
      return `<div class="week-session${isSelf?' self':''}">${s.time?s.time+' ':''}${esc(wName)||'אימון'}</div>`;
    }).join('');
    html += `<div class="week-col${isToday?' today':''}${isSelected?' selected':''}" onclick="handleClientDayClick('${dateStr}')">
      <div class="week-col-header"><div class="week-col-day">${dayNames[d.getDay()]}</div><div class="week-col-num">${d.getDate()}</div></div>
      ${sessHtml}
    </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderClientSessionsTable() {
  const container = document.getElementById('client-sessions-table');
  const sessions = load('sessions')
    .filter(s => s.clientId === _currentClientId && s.type === 'training' && s.date === _clientCalSelectedDate)
    .sort((a,b) => (a.time||'').localeCompare(b.time||''));

  if (!sessions.length) {
    container.innerHTML = `<div class="empty" style="padding:20px">אין אימונים ב-${fmtDate(_clientCalSelectedDate)}</div>`;
    return;
  }

  container.innerHTML = sessions.map(s => {
    const pName = s.planId ? planName(s.planId) : '';
    const wName = s.planId ? getWorkoutName(s.planId, s.workoutIdx) : '';
    const isSelf = s.source === 'client';
    const sourceBadge = isSelf ? '<span class="badge badge-self">עצמאית</span>' : '<span class="badge badge-trainer">עם מאמן</span>';
    const exCount = (s.log && s.log.length) ? s.log.length + ' תרגילים' : '';
    const isExpanded = _expandedSession === s.id;

    let detailHtml = '';
    if (isExpanded && s.log && s.log.length) {
      detailHtml = '<div class="workout-card-detail" style="width:100%">' + s.log.map(ex => {
        const setsStr = ex.sets.map((st,i) => `<span class="wcd-set">סט${i+1}: ${st.reps||'—'}x${st.weight?st.weight+'kg':'—'}</span>`).join('');
        return `<div class="wcd-exercise">
          <div class="wcd-ex-name">${ex.videoUrl?`<a href="${esc(ex.videoUrl)}" target="_blank">${esc(ex.exerciseName)}</a>`:esc(ex.exerciseName)}${ex.category?` <span class="badge badge-cat">${esc(ex.category)}</span>`:''}</div>
          <div class="wcd-sets">${setsStr}</div>
        </div>`;
      }).join('') + '</div>';
    } else if (isExpanded) {
      detailHtml = '<div class="workout-card-detail" style="width:100%"><div class="empty" style="padding:16px">לא תועדו תרגילים באימון זה</div></div>';
    }

    const editBtn = isSelf
      ? `<button class="btn btn-sm" onclick="event.stopPropagation();editClientSession('${s.id}')" title="ערוך">&#9998;</button>`
      : `<button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();toggleSession('${s.id}')" title="צפה">&#128065;</button>`;
    const deleteBtn = isSelf
      ? `<button class="btn btn-sm" style="background:#7b1d2e" onclick="event.stopPropagation();deleteClientSession('${s.id}')" title="מחק">&#128465;</button>`
      : '';
    const liveBtn = isSelf
      ? `<button class="btn btn-sm" style="background:#5c4b9e" onclick="event.stopPropagation();openLiveFromCalendar('${s.id}')" title="אימון חי">&#128203;</button>`
      : '';

    return `<div class="day-session-item" style="cursor:pointer;flex-wrap:wrap" onclick="toggleSession('${s.id}')">
      <div class="day-session-info">
        <strong>${s.time||''}</strong> ${pName?esc(pName):''} ${wName?'· '+esc(wName):''} ${exCount?'· '+exCount:''}
      </div>
      <div class="day-session-actions">
        ${sourceBadge} ${editBtn} ${deleteBtn} ${liveBtn}
      </div>
      ${detailHtml}
    </div>`;
  }).join('');
}

function handleClientDayClick(dateStr) {
  _clientCalSelectedDate = dateStr;
  renderMyWorkouts();
}

function clientCalPrev() {
  if (_clientCalView === 'month') {
    _clientCalMonth--;
    if (_clientCalMonth < 0) { _clientCalMonth = 11; _clientCalYear--; }
  } else {
    _clientCalWeekStart = addDays(_clientCalWeekStart, -7);
  }
  renderMyWorkouts();
}

function clientCalNext() {
  if (_clientCalView === 'month') {
    _clientCalMonth++;
    if (_clientCalMonth > 11) { _clientCalMonth = 0; _clientCalYear++; }
  } else {
    _clientCalWeekStart = addDays(_clientCalWeekStart, 7);
  }
  renderMyWorkouts();
}

function setClientCalView(view) {
  _clientCalView = view;
  if (view === 'week' && !_clientCalWeekStart) {
    const today = new Date();
    today.setDate(today.getDate() - today.getDay());
    _clientCalWeekStart = today.toISOString().slice(0,10);
  }
  renderMyWorkouts();
}

function editClientSession(sessionId) {
  switchTab('newworkout');
  openLiveWorkout(sessionId);
}

async function deleteClientSession(sessionId) {
  const s = load('sessions').find(x => x.id === sessionId);
  if (!s || s.source !== 'client') return;
  if (!confirm('למחוק את האימון?')) return;
  cache.sessions = cache.sessions.filter(x => x.id !== sessionId);
  await db.collection('sessions').doc(sessionId).delete();
  showToast('האימון נמחק ✓');
  renderMyWorkouts();
}

function openLiveFromCalendar(sessionId) {
  switchTab('newworkout');
  openLiveWorkout(sessionId);
}

function openAddClientSession() {
  const plans = load('plans').filter(p => p.clientId === _currentClientId && !p.isTemplate);
  const planOptions = plans.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
  const firstPlan = plans[0];
  const workoutOptions = firstPlan ? getPlanWorkouts(firstPlan).map((w,i) => `<option value="${i}">${esc(w.name)}</option>`).join('') : '';

  const html = `<form id="modal-form">
    <div class="form-group">
      <label>תאריך</label>
      <input type="date" name="date" value="${_clientCalSelectedDate}" required>
    </div>
    <div class="form-group">
      <label>שעה</label>
      <input type="time" name="time" value="${new Date().toTimeString().slice(0,5)}">
    </div>
    <div class="form-group">
      <label>תוכנית</label>
      <select name="planId" onchange="updateAddSessionWorkouts(this.value)">
        ${planOptions || '<option value="">אין תוכניות</option>'}
      </select>
    </div>
    <div class="form-group">
      <label>אימון</label>
      <select name="workoutIdx" id="add-session-workout-select">
        ${workoutOptions}
      </select>
    </div>
    <div class="form-group">
      <label>סוג</label>
      <div class="source-radio">
        <label><input type="radio" name="source" value="client" checked> עצמאית</label>
        <label><input type="radio" name="source" value="client_trainer"> עם מאמן</label>
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-ghost" onclick="closeModal()">ביטול</button>
      <button type="submit" class="btn">שמור</button>
    </div>
  </form>`;

  openModal('הוסף אימון', html, async (fd) => {
    const session = {
      id: uid(),
      type: 'training',
      clientId: _currentClientId,
      planId: fd.get('planId') || '',
      workoutIdx: +(fd.get('workoutIdx') || 0),
      date: fd.get('date'),
      time: fd.get('time') || '',
      duration: '',
      notes: '',
      source: fd.get('source') === 'client_trainer' ? 'client_trainer' : 'client',
      isRecurring: false,
      recurringGroupId: '',
      log: []
    };
    await saveItem('sessions', session);
    _clientCalSelectedDate = session.date;
    showToast('אימון נוסף ✓');
    renderMyWorkouts();
  });
}

function updateAddSessionWorkouts(planId) {
  const plan = load('plans').find(p => p.id === planId);
  const sel = document.getElementById('add-session-workout-select');
  if (!plan || !sel) return;
  const workouts = getPlanWorkouts(plan);
  sel.innerHTML = workouts.map((w,i) => `<option value="${i}">${esc(w.name)}</option>`).join('');
}

function getWorkoutName(planId, workoutIdx) {
  const plan = load('plans').find(p=>p.id===planId);
  if (!plan) return '';
  const workouts = getPlanWorkouts(plan);
  return (workouts[workoutIdx||0]||{}).name || '';
}

function toggleSession(sessionId) {
  _expandedSession = _expandedSession === sessionId ? '' : sessionId;
  // Re-render whichever tab is active
  const myTab = document.getElementById('tab-myworkouts');
  if (myTab && myTab.classList.contains('active')) {
    renderClientSessionsTable();
  }
}

// ============================
// ===== NEW WORKOUT ==========
// ============================
let _liveWorkout = { active:false, sessionId:'', currentIdx:0, log:[], session:null, previousData:{}, saveTimer:null, showSwapBrowser:false, swapExpandedCat:'' };

function renderNewWorkout() {
  const container = document.getElementById('newworkout-content');

  if (_liveWorkout.active) {
    renderLiveWorkout();
    return;
  }

  const plans = load('plans').filter(p => p.clientId === _currentClientId && !p.isTemplate);
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const nowTime = now.toTimeString().slice(0,5);

  // New workout section
  let html = `<div class="card" style="margin-bottom:20px">
    <h3 style="color:var(--accent2);margin-bottom:14px">הוספת אימון חדש</h3>
    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px">
      <div class="form-group" style="margin:0;min-width:140px">
        <label>תאריך</label>
        <input type="date" id="new-workout-date" value="${todayStr}">
      </div>
      <div class="form-group" style="margin:0;min-width:100px">
        <label>שעה</label>
        <input type="time" id="new-workout-time" value="${nowTime}">
      </div>
    </div>`;

  if (!plans.length) {
    html += '<div class="empty" style="padding:16px">אין תוכניות אימון מוקצות. פנה למאמן כדי לקבל תוכנית.</div>';
  } else {
    html += '<div class="plan-picker">';
    plans.forEach(plan => {
      const workouts = getPlanWorkouts(plan);
      const btns = workouts.map((w,i) =>
        `<button class="workout-btn" onclick="startClientWorkout('${plan.id}',${i})">${esc(w.name)}<br><small style="color:var(--muted)">${w.exercises.length} תרגילים</small></button>`
      ).join('');
      html += `<div class="plan-pick-card">
        <div class="plan-pick-name">${esc(plan.name)}</div>
        <div class="workout-btns">${btns}</div>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // Past workouts table
  const sessions = load('sessions')
    .filter(s => s.clientId === _currentClientId && s.type === 'training')
    .sort((a,b) => b.date.localeCompare(a.date) || (b.time||'').localeCompare(a.time||''));

  if (sessions.length) {
    // Build matrix: exercises as rows, sessions as columns
    // Collect all unique exercise names in order of first appearance
    const allExNames = [];
    sessions.forEach(s => {
      if (!s.log) return;
      s.log.forEach(ex => {
        if (ex.exerciseName && !allExNames.includes(ex.exerciseName)) allExNames.push(ex.exerciseName);
      });
    });

    // Sort sessions ascending for left-to-right reading (oldest → newest)
    const sortedSessions = [...sessions].sort((a,b) => a.date.localeCompare(b.date));

    // Column headers: date + workout name + edit button for self sessions
    const colHeaders = sortedSessions.map(s => {
      const wName = s.planId ? getWorkoutName(s.planId, s.workoutIdx) : '';
      const isSelf = s.source === 'client';
      const editBtn = isSelf ? `<div style="margin-top:4px"><button class="btn btn-sm" onclick="editClientSession('${s.id}')" title="ערוך אימון" style="font-size:.7rem;padding:2px 8px">&#9998; ערוך</button></div>` : '';
      return `<th style="padding:8px 6px;text-align:center;color:var(--text);border-bottom:2px solid var(--border);font-weight:600;font-size:.78rem;min-width:90px;vertical-align:bottom">
        <div>${fmtDate(s.date)}</div>
        ${wName?'<div style="color:var(--accent2);font-size:.7rem">'+esc(wName)+'</div>':''}
        <div style="margin-top:3px">${isSelf?'<span class="badge badge-self" style="font-size:.65rem">עצמאית</span>':'<span class="badge badge-trainer" style="font-size:.65rem">עם מאמן</span>'}</div>
        ${editBtn}
      </th>`;
    }).join('');

    // Exercise rows
    const exRows = allExNames.map(exName => {
      const cells = sortedSessions.map(s => {
        if (!s.log) return '<td style="padding:6px;text-align:center;color:var(--border);border-bottom:1px solid rgba(15,52,96,.3)">—</td>';
        const ex = s.log.find(e => e.exerciseName === exName);
        if (!ex) return '<td style="padding:6px;text-align:center;color:var(--border);border-bottom:1px solid rgba(15,52,96,.3)">—</td>';

        const setsHtml = ex.sets.map((st,si) => {
          const r = st.reps || '—';
          const w = st.weight ? st.weight+'kg' : '—';
          return `<div style="font-size:.76rem;padding:2px 0;${si>0?'border-top:1px solid rgba(15,52,96,.2)':''}">
            <span style="color:var(--accent)">${r}</span><span style="color:var(--muted)">x</span><span style="color:var(--accent2)">${w}</span>
          </div>`;
        }).join('');

        return `<td style="padding:6px;text-align:center;border-bottom:1px solid rgba(15,52,96,.3)">${setsHtml}</td>`;
      }).join('');

      return `<tr>
        <td style="padding:6px 10px;color:var(--accent2);font-weight:600;font-size:.82rem;border-bottom:1px solid rgba(15,52,96,.3);white-space:nowrap">${esc(exName)}</td>
        ${cells}
      </tr>`;
    }).join('');

    html += `<div class="card">
      <h3 style="color:var(--accent2);margin-bottom:14px">אימונים קודמים</h3>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>
            <th style="padding:8px 10px;text-align:right;color:var(--muted);border-bottom:2px solid var(--border);font-weight:600;font-size:.82rem;position:sticky;right:0;background:var(--card);z-index:1">תרגיל</th>
            ${colHeaders}
          </tr></thead>
          <tbody>${exRows}</tbody>
        </table>
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

function toggleSessionInTable(sessionId) {
  _expandedSession = _expandedSession === sessionId ? '' : sessionId;
  renderNewWorkout();
}

async function startClientWorkout(planId, workoutIdx) {
  const dateInput = document.getElementById('new-workout-date');
  const timeInput = document.getElementById('new-workout-time');
  const now = new Date();
  const session = {
    id: uid(),
    type: 'training',
    clientId: _currentClientId,
    planId: planId,
    workoutIdx: workoutIdx,
    date: (dateInput && dateInput.value) || now.toISOString().slice(0,10),
    time: (timeInput && timeInput.value) || now.toTimeString().slice(0,5),
    duration: '',
    notes: '',
    source: 'client',
    isRecurring: false,
    recurringGroupId: '',
    log: []
  };
  await saveItem('sessions', session);
  openLiveWorkout(session.id);
}

// ===========================
// ===== LIVE WORKOUT ========
// ===========================
function openLiveWorkout(sessionId) {
  const s = load('sessions').find(x=>x.id===sessionId);
  if (!s) return;
  let log;
  if (s.log && s.log.length) {
    log = JSON.parse(JSON.stringify(s.log));
  } else if (s.planId) {
    const plan = load('plans').find(p=>p.id===s.planId);
    if (plan) {
      const workouts = getPlanWorkouts(plan);
      const workout = workouts[s.workoutIdx||0] || workouts[0];
      if (workout && workout.exercises.length) {
        log = workout.exercises.map(e => {
          const ex = migrateExercise(e);
          return { exerciseName:ex.name, category:ex.category||'', videoUrl:ex.videoUrl||'',
            sets:ex.setsData.map(sd=>({ targetReps:+sd.targetReps||0, reps:'', weight:sd.weight||'', notes:sd.notes||'' })) };
        });
      } else { log = []; }
    } else { log = []; }
  } else { log = []; }
  _liveWorkout = { active:true, sessionId, currentIdx:0, log, session:s, previousData:{}, saveTimer:null, showSwapBrowser:false, swapExpandedCat:'' };
  loadPreviousSessionData(_currentClientId, log);
  renderNewWorkout();
}

function loadPreviousSessionData(clientId, log) {
  const past = load('sessions').filter(s=>s.clientId===clientId&&s.log&&s.log.length&&s.id!==_liveWorkout.sessionId).sort((a,b)=>b.date.localeCompare(a.date));
  const prev = {};
  for (const ex of log) {
    for (const s of past) {
      const entry = s.log.find(l=>l.exerciseName===ex.exerciseName);
      if (entry) { prev[ex.exerciseName] = { sets:entry.sets, date:s.date }; break; }
    }
  }
  _liveWorkout.previousData = prev;
}

async function closeLiveWorkout() {
  clearTimeout(_liveWorkout.saveTimer);
  await liveDoSave();
  _liveWorkout.active = false;
  renderNewWorkout();
  showToast('האימון נשמר ✓');
}

function liveAutoSave() {
  clearTimeout(_liveWorkout.saveTimer);
  _liveWorkout.saveTimer = setTimeout(()=>liveDoSave(), 1000);
}

async function liveDoSave() {
  const s = _liveWorkout.session;
  if (!s) return;
  s.log = _liveWorkout.log.filter(ex=>ex.exerciseName.trim()).map(ex=>({
    exerciseName:ex.exerciseName.trim(), category:ex.category||'', videoUrl:ex.videoUrl||'',
    sets:ex.sets.map(st=>({ targetReps:+st.targetReps||0, reps:+st.reps||0, weight:st.weight||'', notes:(st.notes||'').trim() }))
  }));
  await saveItem('sessions', s);
}

function renderLiveWorkout() {
  const container = document.getElementById('newworkout-content');
  const total = _liveWorkout.log.length;

  container.innerHTML = `<div class="live-workout">
    <div class="live-header">
      <div><span class="live-progress">תרגיל ${_liveWorkout.currentIdx+1} מתוך ${total}</span></div>
      <button class="btn btn-sm" onclick="closeLiveWorkout()">סיים אימון &#10003;</button>
    </div>
    <div id="live-card-container">${renderLiveCard()}</div>
    ${_liveWorkout.showSwapBrowser?renderLiveSwapOverlay():''}
  </div>`;
}

function renderLiveCard() {
  const idx = _liveWorkout.currentIdx;
  const total = _liveWorkout.log.length;
  if (!total) return '<div class="pb-empty">אין תרגילים באימון</div>';
  const ex = _liveWorkout.log[idx];
  const prev = _liveWorkout.previousData[ex.exerciseName];

  let prevHtml = '';
  if (prev) {
    const prevSets = prev.sets.map((st,i)=>`<span class="live-prev-set">סט${i+1}: ${st.reps||'—'}x${st.weight?st.weight+'kg':'—'}</span>`).join('');
    prevHtml = `<div class="live-prev"><div class="live-prev-title">פעם קודמת (${fmtDate(prev.date)})</div><div class="live-prev-sets">${prevSets}</div></div>`;
  }

  const setsHtml = ex.sets.map((s,si)=>`<div class="live-set-row">
    <span>סט ${si+1}</span>
    <input type="number" min="0" placeholder="${s.targetReps||'חזרות'}" value="${s.reps||''}" oninput="_liveWorkout.log[${idx}].sets[${si}].reps=this.value;liveAutoSave()">
    <input type="number" min="0" step="0.5" placeholder="${s.weight?s.weight:'משקל'}" value="${s.weight||''}" oninput="_liveWorkout.log[${idx}].sets[${si}].weight=this.value;liveAutoSave()">
    <input placeholder="הערות" value="${esc(s.notes||'')}" oninput="_liveWorkout.log[${idx}].sets[${si}].notes=this.value;liveAutoSave()">
    <button class="ex-remove" onclick="liveRemoveSet(${idx},${si})" style="font-size:.9rem;min-height:44px">&#10005;</button>
  </div>`).join('');

  return `<div class="live-card">
    <div class="live-ex-name">${ex.videoUrl?`<a href="${esc(ex.videoUrl)}" target="_blank">${esc(ex.exerciseName)}</a>`:esc(ex.exerciseName)}
      ${ex.category?` <span class="badge badge-cat">${esc(ex.category)}</span>`:''}
    </div>
    ${ex.videoUrl?`<a href="${esc(ex.videoUrl)}" target="_blank" style="color:var(--accent2);font-size:.8rem">&#9654; סרטון</a>`:''}
    ${prevHtml}
    <div style="margin:12px 0 6px;color:var(--muted);font-size:.78rem;font-weight:600">סטים</div>
    <div class="live-sets-header"><span></span><span>חזרות</span><span>משקל</span><span>הערות</span><span></span></div>
    ${setsHtml}
    <button class="ex-add-set" onclick="liveAddSet(${idx})" style="min-height:40px">+ הוסף סט</button>
    <button class="live-swap-btn" onclick="liveShowSwap()">&#128260; החלף תרגיל</button>
    <button class="live-swap-btn" onclick="liveAddExercise()">+ הוסף תרגיל</button>
  </div>
  <div class="live-nav">
    <button class="btn btn-ghost" onclick="livePrev()" ${idx===0?'disabled':''}>&#8592; הקודם</button>
    <button class="btn" onclick="${idx>=total-1?'closeLiveWorkout()':'liveNext()'}">${idx>=total-1?'סיום &#10003;':'הבא &#8594;'}</button>
  </div>`;
}

function liveNext() { if(_liveWorkout.currentIdx<_liveWorkout.log.length-1){_liveWorkout.currentIdx++;updateLiveCard();} }
function livePrev() { if(_liveWorkout.currentIdx>0){_liveWorkout.currentIdx--;updateLiveCard();} }
function updateLiveCard() {
  const container = document.getElementById('live-card-container');
  if(container) container.innerHTML = renderLiveCard();
  const prog = document.querySelector('.live-progress');
  if (prog) prog.textContent = `תרגיל ${_liveWorkout.currentIdx+1} מתוך ${_liveWorkout.log.length}`;
}
function liveAddSet(idx) {
  _liveWorkout.log[idx].sets.push({targetReps:'',reps:'',weight:'',notes:''});
  updateLiveCard(); liveAutoSave();
}
function liveRemoveSet(idx, si) {
  _liveWorkout.log[idx].sets.splice(si,1);
  if(!_liveWorkout.log[idx].sets.length) _liveWorkout.log[idx].sets.push({targetReps:'',reps:'',weight:'',notes:''});
  updateLiveCard(); liveAutoSave();
}
function liveAddExercise() {
  _liveWorkout.log.push({ exerciseName:'', category:'', videoUrl:'', sets:[{targetReps:'',reps:'',weight:'',notes:''}] });
  _liveWorkout.currentIdx = _liveWorkout.log.length - 1;
  updateLiveCard();
  liveAutoSave();
  liveShowSwap();
}
function liveShowSwap() {
  _liveWorkout.showSwapBrowser=true; _liveWorkout.swapExpandedCat='';
  document.querySelector('.live-swap-overlay')?.remove();
  const div = document.createElement('div');
  div.innerHTML = renderLiveSwapOverlay();
  document.body.appendChild(div.firstElementChild);
}
function liveHideSwap() {
  _liveWorkout.showSwapBrowser=false;
  document.querySelector('.live-swap-overlay')?.remove();
}

function renderLiveSwapOverlay() {
  const allExercises = load('exercises');
  const cats = EX_CATS.filter(cat=>allExercises.some(e=>e.category===cat));
  let listHtml;
  if (_liveWorkout.swapExpandedCat) {
    const exs = allExercises.filter(e=>e.category===_liveWorkout.swapExpandedCat);
    listHtml = exs.map(e=>`<div class="pb-ex-item" onclick="liveConfirmSwap('${e.id}')">
      <div class="pb-ex-names"><div class="pb-ex-name">${esc(e.name)}</div>${e.nameEn?`<div class="pb-ex-name-en">${esc(e.nameEn)}</div>`:''}</div>
      <div class="pb-ex-actions"><button class="pb-ex-add" style="opacity:1">+</button></div>
    </div>`).join('');
  } else { listHtml = ''; }
  const catsHtml = cats.map(cat=>{
    const count = allExercises.filter(e=>e.category===cat).length;
    const isOpen = _liveWorkout.swapExpandedCat===cat;
    return `<button class="pb-group-btn${isOpen?' active':''}" onclick="_liveWorkout.swapExpandedCat=_liveWorkout.swapExpandedCat==='${cat}'?'':'${cat}';refreshSwapOverlay()"><span>${esc(cat)}</span><span class="pb-count">${count}</span></button>${isOpen?listHtml:''}`;
  }).join('');
  return `<div class="live-swap-overlay" onclick="liveHideSwap()">
    <div class="live-swap-panel" onclick="event.stopPropagation()">
      <div class="live-swap-panel-header"><span style="font-weight:600;color:var(--accent2)">החלף תרגיל</span><button class="ex-remove" onclick="liveHideSwap()" style="font-size:1.2rem">&#10005;</button></div>
      ${catsHtml}
    </div>
  </div>`;
}
function refreshSwapOverlay() {
  document.querySelector('.live-swap-overlay')?.remove();
  const div = document.createElement('div');
  div.innerHTML = renderLiveSwapOverlay();
  document.body.appendChild(div.firstElementChild);
}

function liveConfirmSwap(exId) {
  const ex = load('exercises').find(e=>e.id===exId);
  if(!ex) return;
  const idx = _liveWorkout.currentIdx;
  const old = _liveWorkout.log[idx];
  _liveWorkout.log[idx] = { exerciseName:ex.name, category:ex.category||'', videoUrl:ex.videoUrl||'',
    sets:old.sets.length?old.sets:[{targetReps:10,reps:'',weight:'',notes:''}] };
  const past = load('sessions').filter(s=>s.clientId===_currentClientId&&s.log&&s.log.length&&s.id!==_liveWorkout.sessionId).sort((a,b)=>b.date.localeCompare(a.date));
  for (const s of past) {
    const entry = s.log.find(l=>l.exerciseName===ex.name);
    if (entry) { _liveWorkout.previousData[ex.name] = { sets:entry.sets, date:s.date }; break; }
  }
  _liveWorkout.showSwapBrowser = false;
  document.querySelector('.live-swap-overlay')?.remove();
  liveAutoSave();
  updateLiveCard();
  showToast(`הוחלף ל-${ex.name} ✓`);
}

// ===========================
// ===== TRACKING ============
// ===========================
let _trackingSessionIdx = 0;
let _trackingChartExercise = '';
let _trackingSubTab = 'sessions';
let _trackingChartSelectedEx = '';
let _trackingChartMode = 'weight';

function selectTrackingSession(idx) {
  _trackingSessionIdx = idx;
  _trackingChartExercise = '';
  renderTrackingContent();
}

function toggleTrackingChart(exName) {
  _trackingChartExercise = _trackingChartExercise === exName ? '' : exName;
  renderTrackingContent();
}

function setTrackingSubTab(tab) {
  _trackingSubTab = tab;
  renderTrackingContent();
}

function editSessionFromTracking(sessionId) {
  // Open live workout for this session to edit it
  switchTab('newworkout');
  openLiveWorkout(sessionId);
}

function renderTracking() {
  renderTrackingContent();
}

function renderTrackingContent() {
  const container = document.getElementById('tracking-content');
  if (!_currentClientId) { container.innerHTML = '<div class="empty">יש להתחבר קודם.</div>'; return; }

  const sessions = load('sessions')
    .filter(s => s.clientId === _currentClientId && s.log && s.log.length)
    .sort((a,b) => a.date.localeCompare(b.date));
  if (!sessions.length) { container.innerHTML = '<div class="empty">אין אימונים מתועדים עדיין. התחל להתאמן!</div>'; return; }

  container.innerHTML = renderTrackingChartsTab(sessions);
}

function renderTrackingChartsTab(sessions) {
  const allExNames = [];
  sessions.forEach(s => {
    s.log.forEach(ex => {
      if (ex.exerciseName && !allExNames.includes(ex.exerciseName)) allExNames.push(ex.exerciseName);
    });
  });
  if (!allExNames.length) return '<div class="empty">אין תרגילים מתועדים.</div>';
  if (!_trackingChartSelectedEx || !allExNames.includes(_trackingChartSelectedEx)) _trackingChartSelectedEx = allExNames[0];

  const options = allExNames.map(name =>
    `<option value="${esc(name)}"${name===_trackingChartSelectedEx?' selected':''}>${esc(name)}</option>`
  ).join('');

  const dropdown = `<div class="form-group" style="margin-bottom:16px;max-width:400px">
    <label>בחר תרגיל</label>
    <select onchange="_trackingChartSelectedEx=this.value;renderTrackingContent()">${options}</select>
  </div>`;

  const modeToggle = `<div style="display:flex;gap:0;border:2px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;width:fit-content">
    <button style="background:${_trackingChartMode==='weight'?'var(--accent)':'none'};border:none;color:${_trackingChartMode==='weight'?'#fff':'var(--muted)'};padding:6px 16px;cursor:pointer;font-size:.82rem;font-family:inherit" onclick="_trackingChartMode='weight';renderTrackingContent()">לפי משקל</button>
    <button style="background:${_trackingChartMode==='reps'?'var(--accent)':'none'};border:none;color:${_trackingChartMode==='reps'?'#fff':'var(--muted)'};padding:6px 16px;cursor:pointer;font-size:.82rem;font-family:inherit" onclick="_trackingChartMode='reps';renderTrackingContent()">לפי חזרות</button>
  </div>`;

  const chartHtml = renderExerciseChart(_trackingChartSelectedEx, sessions);

  const data = [];
  sessions.forEach(s => {
    const ex = s.log.find(e => e.exerciseName === _trackingChartSelectedEx);
    if (ex) data.push({ date: s.date, sets: ex.sets });
  });

  const tableRows = data.map(e => {
    const setsStr = e.sets.map((s,i) => `${s.reps||'---'}x${s.weight?s.weight+'kg':'---'}`).join(' | ');
    const maxWeight = Math.max(...e.sets.map(s => +s.weight || 0));
    const totalReps = e.sets.reduce((sum,s) => sum + (+s.reps||0), 0);
    return `<tr><td style="text-align:center;padding:5px 8px;border-bottom:1px solid rgba(15,52,96,.3)">${fmtDate(e.date)}</td><td style="text-align:center;padding:5px 8px;border-bottom:1px solid rgba(15,52,96,.3)">${e.sets.length}</td><td style="text-align:center;padding:5px 8px;border-bottom:1px solid rgba(15,52,96,.3)">${setsStr}</td><td style="text-align:center;padding:5px 8px;border-bottom:1px solid rgba(15,52,96,.3)">${maxWeight||'---'}</td><td style="text-align:center;padding:5px 8px;border-bottom:1px solid rgba(15,52,96,.3)">${totalReps}</td></tr>`;
  }).join('');

  const thStyle = 'text-align:center;padding:6px 8px;color:var(--muted);border-bottom:1px solid var(--border)';
  const table = data.length ? `<div class="tr-ex-row" style="margin-top:16px">
    <table style="width:100%;border-collapse:collapse;font-size:.82rem">
      <thead><tr><th style="${thStyle}">תאריך</th><th style="${thStyle}">סטים</th><th style="${thStyle}">חזרות x משקל (kg)</th><th style="${thStyle}">משקל מקס׳</th><th style="${thStyle}">סה״כ חזרות</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
  </div>` : '';

  return `${dropdown}${modeToggle}${chartHtml}${table}`;
}

function renderExerciseChart(exName, sessions) {
  const data = [];
  sessions.forEach(s => {
    const ex = s.log.find(e => e.exerciseName === exName);
    if (ex) data.push({ date: s.date, sets: ex.sets || [] });
  });
  if (data.length < 1) return '<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:8px">אין אימונים מתועדים לתרגיל זה</div>';

  const mode = _trackingChartMode;
  const yLabel = mode === 'weight' ? 'משקל (kg)' : 'חזרות';
  const barColor = mode === 'weight' ? 'var(--accent)' : 'var(--accent2)';

  const maxSets = Math.max(...data.map(d => d.sets.length));
  const w = Math.max(600, data.length * (maxSets * 32 + 40));
  const h = 220, padTop = 20, padBottom = 50, padLeft = 50, padRight = 20;
  const chartW = w - padLeft - padRight;
  const chartH = h - padTop - padBottom;

  let maxY = 0;
  data.forEach(d => d.sets.forEach(s => {
    const val = mode === 'weight' ? (+s.weight || 0) : (+s.reps || 0);
    if (val > maxY) maxY = val;
  }));
  if (maxY === 0) maxY = 1;
  maxY = Math.ceil(maxY * 1.15);

  const groupW = chartW / data.length;
  const barGap = 3;
  const barW = Math.min(28, Math.max(14, (groupW - 20) / maxSets - barGap));

  let bars = '', labels = '', gridLines = '';

  const yStep = maxY <= 30 ? 1 : maxY <= 60 ? 2 : maxY <= 100 ? 5 : 10;
  for (let val = 0; val <= maxY; val += yStep) {
    const y = padTop + chartH - (val / maxY) * chartH;
    gridLines += `<line x1="${padLeft}" y1="${y}" x2="${w-padRight}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
    gridLines += `<text x="${padLeft-14}" y="${y+4}" text-anchor="end" fill="var(--muted)" font-size="9">${val}</text>`;
  }

  data.forEach((d, gi) => {
    const groupX = padLeft + gi * groupW;
    const groupCenter = groupX + groupW / 2;
    const totalBarsW = d.sets.length * barW + (d.sets.length - 1) * barGap;
    const startX = groupCenter - totalBarsW / 2;

    d.sets.forEach((s, si) => {
      const yVal = mode === 'weight' ? (+s.weight || 0) : (+s.reps || 0);
      const insideVal = mode === 'weight' ? (s.reps || '') : (s.weight ? s.weight + '' : '');
      const barH = (yVal / maxY) * chartH;
      const x = startX + si * (barW + barGap);
      const y = padTop + chartH - barH;

      bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="3" fill="${barColor}" opacity="0.85"/>`;
      if (insideVal && barH > 16) {
        bars += `<text x="${x + barW/2}" y="${y + barH/2 + 4}" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">${insideVal}</text>`;
      }
    });

    labels += `<text x="${groupCenter}" y="${h - 8}" text-anchor="middle" fill="var(--text)" font-size="9">${fmtDate(d.date)}</text>`;
  });

  const yAxisLabel = `<text x="12" y="${padTop + chartH/2}" text-anchor="middle" fill="var(--muted)" font-size="9" transform="rotate(-90,12,${padTop + chartH/2})">${yLabel}</text>`;
  const legendText = mode === 'weight' ? 'מספר בתוך העמודה = חזרות' : 'מספר בתוך העמודה = משקל (kg)';

  const svg = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;min-height:200px">
    ${gridLines}
    <line x1="${padLeft}" y1="${padTop}" x2="${padLeft}" y2="${padTop+chartH}" stroke="var(--border)" stroke-width="1"/>
    <line x1="${padLeft}" y1="${padTop+chartH}" x2="${w-padRight}" y2="${padTop+chartH}" stroke="var(--border)" stroke-width="1"/>
    ${bars}${labels}${yAxisLabel}
  </svg>`;

  return `<div class="tr-chart-card">
    <div class="tr-chart-title">התקדמות: ${esc(exName)}</div>
    <div style="overflow-x:auto">${svg}</div>
    <div style="text-align:center;font-size:.72rem;color:var(--muted);margin-top:6px">${legendText}</div>
  </div>`;
}

// ===========================
// ===== INIT ================
// ===========================
async function init() {
  document.getElementById('loading-overlay').style.display = 'flex';
  try {
    await initDB();
    // Verify client still exists
    const client = load('clients').find(c => c.id === _currentClientId);
    if (!client) {
      handleLogout();
      return;
    }
    _currentClientName = client.name;
    const welEl = document.getElementById('client-welcome');
    if (welEl) welEl.textContent = 'ברוכים הבאים, ' + client.name;
    document.getElementById('loading-overlay').style.display = 'none';
    switchTab('myworkouts');
  } catch(err) {
    console.error(err);
    document.querySelector('.loading-box p').textContent = 'שגיאה בטעינה — רענן את הדף';
  }
}

// Auto-login on page load
(async function() {
  const stored = localStorage.getItem('ft_client_auth');
  if (stored) {
    try {
      const { clientId, phone } = JSON.parse(stored);
      _currentClientId = clientId;
      document.getElementById('login-screen').style.display = 'none';
      init();
    } catch(e) {
      localStorage.removeItem('ft_client_auth');
    }
  }
})();
</script>
